<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#030711">
<title>Knowledge Codex</title>
<style>
  :root {
    --bg: #030711;
    --panel: rgba(10, 20, 48, 0.62);
    --panel-solid: rgba(8, 16, 42, 0.96);
    --line: #1c3566;
    --line-bright: #3a76ff;
    --cyan: #7aa8ff;
    --cyan-dim: #5585e8;
    --text: #dbe7ff;
    --muted: #52689c;
    --amber: #ffd98a;
    --green: #9fe6b8;
    --mono: Consolas, "Courier New", monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
  }

  #bg { position: fixed; inset: 0; z-index: 0; }

  .hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 30;
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    padding: 12px 18px 10px;
    font-family: var(--mono); font-size: 12px; letter-spacing: 1px;
    color: var(--cyan-dim);
    background: linear-gradient(180deg, rgba(3,7,17,0.9), transparent);
    pointer-events: none;
  }
  .hud::after {
    content: ""; position: absolute; left: 18px; right: 18px; bottom: 0; height: 1px;
    background: linear-gradient(90deg, var(--line-bright), rgba(58,110,255,0.06) 60%, transparent);
  }
  .hud .brand { color: var(--cyan); font-size: 14px; letter-spacing: 3px; cursor: pointer; pointer-events: auto; }
  .hud .right { display: flex; align-items: center; gap: 12px; pointer-events: auto; }
  .hud .stats { text-align: right; }
  .hud .stats span { color: var(--cyan); }
  .hud .gear {
    cursor: pointer; color: var(--cyan-dim); border: 1px solid var(--line);
    border-radius: 4px; padding: 3px 8px; font-size: 12px; background: rgba(6,13,34,0.6);
  }
  .hud .gear:hover { color: var(--cyan); border-color: var(--line-bright); }

  .scene {
    position: fixed; inset: 0; z-index: 10;
    perspective: 1400px; perspective-origin: 50% 42%;
    display: flex; align-items: center; justify-content: center;
  }
  .stage {
    position: relative;
    width: min(1080px, 96vw); height: 620px;
    transform-style: preserve-3d;
    transform: rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)) scale(var(--s, 1));
  }

  .floor {
    position: absolute; left: 50%; top: 66%;
    width: 1800px; height: 1100px;
    transform: translate(-50%, -18%) rotateX(76deg) translateZ(-120px);
    background:
      repeating-linear-gradient(0deg, rgba(58,110,255,0.16) 0 1px, transparent 1px 60px),
      repeating-linear-gradient(90deg, rgba(58,110,255,0.16) 0 1px, transparent 1px 60px);
    -webkit-mask-image: radial-gradient(ellipse 50% 44% at 50% 34%, #000 35%, transparent 78%);
    mask-image: radial-gradient(ellipse 50% 44% at 50% 34%, #000 35%, transparent 78%);
    pointer-events: none;
  }

  .panel {
    position: absolute;
    background: var(--panel);
    border: 1px solid var(--line-bright);
    border-radius: 4px;
    box-shadow: 0 0 26px rgba(58,110,255,0.22), inset 0 0 46px rgba(58,110,255,0.05);
    cursor: pointer;
  }
  .panel::after {
    content: ""; position: absolute; inset: 0; border-radius: 4px; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(122,160,255,0.028) 0 1px, transparent 1px 3px);
  }
  .panel:hover, .panel:active {
    box-shadow: 0 0 40px rgba(122,160,255,0.4), inset 0 0 46px rgba(58,110,255,0.1);
    border-color: var(--cyan);
  }
  .corner { position: absolute; width: 14px; height: 14px; pointer-events: none; z-index: 2; }
  .corner.tl { top: -2px; left: -2px; border-top: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
  .corner.tr { top: -2px; right: -2px; border-top: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }
  .corner.bl { bottom: -2px; left: -2px; border-bottom: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
  .corner.br { bottom: -2px; right: -2px; border-bottom: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }

  .p-head {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 2px; color: var(--cyan);
    padding: 10px 12px 8px;
    border-bottom: 1px solid rgba(58,110,255,0.35);
    background: linear-gradient(90deg, rgba(58,110,255,0.14), transparent 70%);
  }
  .p-head .dot { width: 6px; height: 6px; background: var(--cyan); box-shadow: 0 0 6px var(--cyan); border-radius: 1px; }
  .p-head .jp { margin-left: auto; color: var(--muted); letter-spacing: 0; font-family: "Segoe UI", system-ui, sans-serif; font-size: 11px; }
  .p-body { padding: 12px; }

  .float { animation: panelIn 0.55s ease-out both, bob 7s ease-in-out infinite alternate; }
  .float.d1 { animation-delay: 0.18s, -2.2s; }
  .float.d2 { animation-delay: 0.36s, -4.4s; }
  @keyframes bob { from { transform: translateY(-4px); } to { transform: translateY(5px); } }
  @keyframes panelIn { from { opacity: 0; } to { opacity: 1; } }
  #console { animation: panelIn 0.55s ease-out 0.5s both; }
  .capture { animation: glowPulse 3.2s ease-in-out infinite; }
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 12px rgba(122,160,255,0.35); }
    50% { box-shadow: 0 0 24px rgba(122,160,255,0.65); }
  }

  #panel-archive { left: 0; top: 70px; width: 290px; transform: rotateY(26deg) translateZ(-30px); }
  #panel-records { left: 50%; top: 26px; width: 450px; margin-left: -225px; transform: translateZ(70px); }
  #panel-system { right: 0; top: 70px; width: 290px; transform: rotateY(-26deg) translateZ(-30px); }
  #console { left: 50%; bottom: 10px; width: 640px; margin-left: -320px; transform: translateZ(150px) rotateX(24deg); cursor: default; }

  .meter { margin-bottom: 10px; cursor: pointer; }
  .meter:hover .lbl span:first-child { color: var(--cyan); }
  .meter .lbl { display: flex; justify-content: space-between; font-size: 12px; color: var(--text); margin-bottom: 4px; }
  .meter .lbl span:last-child { font-family: var(--mono); color: var(--cyan); }
  .meter .bar { height: 4px; background: rgba(58,110,255,0.14); border-radius: 2px; overflow: hidden; }
  .meter .bar i { display: block; height: 100%; background: linear-gradient(90deg, var(--line-bright), var(--cyan)); box-shadow: 0 0 6px rgba(122,160,255,0.6); }

  .kcard {
    display: flex; gap: 10px; align-items: stretch;
    background: rgba(12, 24, 54, 0.75);
    border: 1px solid rgba(58,110,255,0.4);
    border-radius: 3px;
    padding: 9px 10px;
    margin-bottom: 9px;
    position: relative;
    cursor: pointer;
  }
  .kcard:hover { border-color: var(--cyan); background: rgba(15, 32, 70, 0.85); }
  .kcard .thumb {
    flex: 0 0 52px; height: 52px; align-self: center;
    border: 1px solid rgba(58,110,255,0.5); border-radius: 4px;
    background:
      linear-gradient(135deg, transparent 42%, rgba(58,110,255,0.35) 43%, transparent 44%),
      linear-gradient(135deg, transparent 56%, rgba(58,110,255,0.25) 57%, transparent 58%),
      rgba(6, 13, 34, 0.8);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 10px; color: var(--muted);
  }
  .kcard .info { min-width: 0; flex: 1; }
  .kcard .row1 { display: flex; align-items: center; gap: 8px; }
  .kcard .kid { font-family: var(--mono); font-size: 11px; color: var(--cyan-dim); }
  .kcard .star { margin-left: auto; font-size: 14px; color: var(--muted); padding: 0 2px; }
  .kcard .star.on { color: var(--cyan); text-shadow: 0 0 6px rgba(122,160,255,0.8); }
  .kcard .title { font-size: 13px; font-weight: 600; color: var(--text); margin: 2px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kcard .one { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kcard .row2 { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
  .imp { font-family: var(--mono); font-size: 10px; color: var(--cyan-dim); letter-spacing: 1px; }
  .tag { font-size: 10px; color: var(--cyan-dim); border: 1px solid rgba(58,110,255,0.45); border-radius: 3px; padding: 1px 6px; }
  .chip { font-size: 10px; border-radius: 3px; padding: 1px 7px; margin-left: auto; white-space: nowrap; }
  .chip.enriched { color: var(--cyan); background: rgba(58,110,255,0.16); border: 1px solid rgba(58,110,255,0.5); }
  .chip.captured { color: var(--amber); background: rgba(255,217,138,0.1); border: 1px solid rgba(255,217,138,0.4); }
  .chip.applied { color: var(--green); background: rgba(159,230,184,0.1); border: 1px solid rgba(159,230,184,0.4); }
  .chip.archived { color: var(--muted); background: rgba(77,125,156,0.1); border: 1px solid rgba(77,125,156,0.4); }

  .sysrow { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px dashed rgba(58,110,255,0.2); font-size: 12px; cursor: pointer; }
  .sysrow:hover span:first-child { color: var(--cyan); }
  .sysrow:last-child { border-bottom: none; cursor: default; }
  .sysrow .v { font-family: var(--mono); color: var(--cyan); font-size: 16px; }
  .sysrow .v.warn { color: var(--amber); }
  .terms { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .terms .tag { cursor: pointer; }
  .terms .tag:hover { color: var(--cyan); border-color: var(--cyan); }

  .console-inner { display: flex; gap: 10px; padding: 12px; align-items: center; }
  .search {
    flex: 1; display: flex; align-items: center; gap: 8px;
    background: rgba(6, 13, 34, 0.8);
    border: 1px solid var(--line); border-radius: 3px;
    padding: 9px 12px;
  }
  .search input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-size: 13px; font-family: inherit; min-width: 0;
  }
  .search input::placeholder { color: var(--muted); }
  .search .key { font-family: var(--mono); font-size: 10px; color: var(--muted); border: 1px solid var(--line); border-radius: 3px; padding: 1px 5px; }
  .capture {
    font-family: var(--mono); font-size: 13px; letter-spacing: 1px;
    color: #041028; background: linear-gradient(180deg, var(--cyan), var(--cyan-dim));
    border: none; border-radius: 3px; padding: 10px 18px; cursor: pointer;
    box-shadow: 0 0 16px rgba(122,160,255,0.45);
    font-weight: 700;
  }
  .capture:active { transform: scale(0.97); }

  #view {
    position: fixed; inset: 0; z-index: 25; display: none;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    background: rgba(3, 7, 17, 0.8);
    padding: 62px 14px 28px;
  }
  #view.open { display: block; }
  .vpanel {
    position: relative; max-width: 880px; margin: 0 auto;
    background: var(--panel-solid);
    border: 1px solid var(--line-bright); border-radius: 4px;
    box-shadow: 0 0 34px rgba(58,110,255,0.28);
    animation: viewIn 0.22s ease-out;
  }
  @keyframes viewIn { from { opacity: 0; transform: scale(0.965) translateY(8px); } to { opacity: 1; transform: none; } }
  .vhead {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 12px; letter-spacing: 2px; color: var(--cyan);
    padding: 12px 14px;
    border-bottom: 1px solid rgba(58,110,255,0.35);
    background: linear-gradient(90deg, rgba(58,110,255,0.14), transparent 70%);
  }
  .hud-back {
    display: none; pointer-events: auto;
    font-family: var(--mono); font-size: 12px; letter-spacing: 1px;
    color: var(--cyan); background: rgba(6,13,34,0.9);
    border: 1px solid var(--line-bright); border-radius: 3px;
    padding: 5px 11px; cursor: pointer;
    box-shadow: 0 0 8px rgba(58,110,255,0.3);
  }
  .hud-back:hover { background: rgba(58,110,255,0.18); color: #dbe7ff; }
  .hud-back:active { transform: scale(0.96); }
  body.view-open .hud .stats, body.view-open .hud .gear { display: none; }
  body.view-open .hud-back { display: inline-block; }
  .vhead .jp { margin-left: auto; color: var(--muted); letter-spacing: 0; font-family: "Segoe UI", system-ui, sans-serif; font-size: 11px; }
  .vbody { padding: 16px 16px 20px; }

  .field { margin-bottom: 13px; }
  .field label { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; color: var(--cyan-dim); margin-bottom: 5px; }
  .field label em { font-style: normal; color: var(--amber); }
  input[type="text"], input[type="search"], input[type="url"], textarea, select {
    width: 100%; background: rgba(6, 13, 34, 0.85);
    border: 1px solid var(--line); border-radius: 3px;
    color: var(--text); padding: 9px 12px; font-size: 14px; font-family: inherit;
    outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--cyan); box-shadow: 0 0 8px rgba(122,160,255,0.25); }
  textarea { resize: vertical; min-height: 90px; }
  select { -webkit-appearance: none; appearance: none; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btnrow { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
  .btn {
    font-family: var(--mono); font-size: 12px; letter-spacing: 1px;
    color: var(--cyan); background: rgba(58,110,255,0.08);
    border: 1px solid var(--line-bright); border-radius: 3px;
    padding: 9px 16px; cursor: pointer;
  }
  .btn:hover { background: rgba(58,110,255,0.18); }
  .btn:active { transform: scale(0.97); }
  .btn.primary { color: #041028; background: linear-gradient(180deg, var(--cyan), var(--cyan-dim)); border: none; font-weight: 700; box-shadow: 0 0 14px rgba(122,160,255,0.4); }
  .btn.danger { color: #ff9a9a; border-color: rgba(255,120,120,0.5); background: rgba(255,120,120,0.06); }
  details.adv { margin-top: 4px; }
  details.adv summary { cursor: pointer; font-family: var(--mono); font-size: 11px; letter-spacing: 1px; color: var(--cyan-dim); padding: 6px 0; list-style: none; }
  details.adv summary::before { content: "▸ "; }
  details.adv[open] summary::before { content: "▾ "; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
  .filters select { width: auto; padding: 6px 26px 6px 10px; font-size: 12px; background-image: linear-gradient(45deg, transparent 50%, var(--cyan-dim) 50%), linear-gradient(135deg, var(--cyan-dim) 50%, transparent 50%); background-position: calc(100% - 14px) 55%, calc(100% - 10px) 55%; background-size: 4px 4px; background-repeat: no-repeat; }
  .filters .fav-toggle { font-size: 13px; padding: 6px 12px; }
  .filters .fav-toggle.on { color: var(--cyan); background: rgba(58,110,255,0.2); }
  .qresult { font-family: var(--mono); font-size: 11px; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }
  .qresult span { color: var(--cyan); }
  .listgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 10px; }
  .listgrid .kcard { margin-bottom: 0; }
  .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 34px 0; }
  .empty .big { font-family: var(--mono); color: var(--cyan-dim); font-size: 15px; letter-spacing: 2px; margin-bottom: 8px; }

  .dhead { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .dhead .kid { font-family: var(--mono); font-size: 13px; color: var(--cyan-dim); }
  .dhead .star { cursor: pointer; font-size: 18px; color: var(--muted); }
  .dhead .star.on { color: var(--cyan); text-shadow: 0 0 8px rgba(122,160,255,0.8); }
  .dtitle { font-size: 19px; font-weight: 700; color: var(--text); margin: 4px 0 2px; }
  .done { font-size: 13px; color: var(--cyan-dim); margin-bottom: 10px; }
  .dmeta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .dmeta .cat { font-size: 11px; color: var(--text); background: rgba(58,110,255,0.12); border: 1px solid rgba(58,110,255,0.4); border-radius: 3px; padding: 2px 8px; }
  .dmeta .date { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-left: auto; }
  .sec { border: 1px solid rgba(58,110,255,0.25); border-radius: 3px; margin-bottom: 12px; overflow: hidden; }
  .sec .shead { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--cyan-dim); padding: 7px 12px; background: rgba(58,110,255,0.07); border-bottom: 1px solid rgba(58,110,255,0.2); }
  .sec .sbody { padding: 12px; font-size: 13px; line-height: 1.8; color: var(--text); white-space: pre-wrap; word-break: break-word; }
  .sec .sbody.dim { color: var(--muted); font-size: 12px; }
  .sec ul { margin: 0 0 0 18px; }
  .sec .term { margin-bottom: 6px; }
  .sec .term b { color: var(--cyan); font-weight: 600; }
  .loglist .log { border-bottom: 1px dashed rgba(58,110,255,0.2); padding: 6px 0; font-size: 12px; }
  .loglist .log:last-child { border-bottom: none; }
  .loglist .log .d { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-right: 8px; }

  .sec.proposal { border-style: dashed; border-color: rgba(255,217,138,0.45); }
  .sec.proposal .shead { color: var(--amber); background: rgba(255,217,138,0.06); border-bottom-color: rgba(255,217,138,0.25); }
  .pchip {
    display: inline-block; font-size: 12px; color: var(--amber);
    border: 1px dashed rgba(255,217,138,0.55); border-radius: 3px;
    padding: 3px 10px; margin: 0 6px 6px 0; cursor: pointer; user-select: none;
  }
  .pchip.on { color: var(--cyan); border: 1px solid var(--line-bright); background: rgba(58,110,255,0.14); }
  .pchip.have { color: var(--muted); border: 1px solid var(--line); cursor: default; }
  .step {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px; color: var(--cyan);
    margin: 16px 0 8px;
  }
  .step .n {
    width: 20px; height: 20px; flex: 0 0 20px; border: 1px solid var(--line-bright); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 11px;
    box-shadow: 0 0 8px rgba(58,110,255,0.3);
  }
  .copybox { font-family: var(--mono); font-size: 11px; min-height: 140px; margin-top: 8px; }
  .applyform { display: none; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .applyform.show { display: flex; }
  .applyform input { flex: 1; min-width: 140px; }

  .kcard .thumb.has-img { background-size: cover; background-position: center; color: transparent; }

  .ltable { width: 100%; border-collapse: collapse; font-size: 12px; }
  .ltable th {
    font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; color: var(--cyan-dim);
    text-align: left; padding: 6px 8px; border-bottom: 1px solid rgba(58,110,255,0.4); white-space: nowrap;
  }
  .ltable td { padding: 7px 8px; border-bottom: 1px dashed rgba(58,110,255,0.18); color: var(--text); white-space: nowrap; }
  .ltable td.tt { white-space: normal; min-width: 160px; }
  .ltable tbody tr { cursor: pointer; }
  .ltable tbody tr:hover td { background: rgba(58,110,255,0.08); }
  .ltable .kid { font-family: var(--mono); color: var(--cyan-dim); font-size: 11px; }

  .attgrid { display: flex; flex-wrap: wrap; gap: 8px; }
  .attgrid .att {
    position: relative; width: 84px; height: 84px; border: 1px solid rgba(58,110,255,0.5); border-radius: 4px;
    overflow: hidden; cursor: pointer; background: rgba(6,13,34,0.8);
  }
  .attgrid .att img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .attgrid .att .rm {
    position: absolute; top: 2px; right: 2px; width: 18px; height: 18px;
    background: rgba(3,7,17,0.85); color: #ff9a9a; border: 1px solid rgba(255,120,120,0.5); border-radius: 3px;
    font-size: 11px; line-height: 16px; text-align: center; cursor: pointer;
  }
  input[type="file"] { color: var(--muted); font-size: 12px; }

  .lightbox {
    position: fixed; inset: 0; z-index: 60; background: rgba(3,7,17,0.92);
    display: flex; align-items: center; justify-content: center; cursor: zoom-out;
  }
  .lightbox img { max-width: 94vw; max-height: 92vh; border: 1px solid var(--line-bright); border-radius: 4px; box-shadow: 0 0 40px rgba(58,110,255,0.4); }

  .gterm { border: 1px solid rgba(58,110,255,0.25); border-radius: 3px; padding: 10px 12px; margin-bottom: 10px; }
  .gterm .gname { color: var(--cyan); font-weight: 700; font-size: 14px; }
  .gterm .gdesc { font-size: 12px; color: var(--text); margin: 4px 0 6px; line-height: 1.7; }
  .gterm .gsrc { display: flex; flex-wrap: wrap; gap: 6px; }
  .gterm .gsrc .tag { cursor: pointer; }
  .gterm .gsrc .tag:hover { color: var(--cyan); border-color: var(--cyan); }

  .netpanel { max-width: 780px; }
  #net-wrap { position: relative; perspective: 1100px; touch-action: none; overflow: hidden; cursor: grab; }
  #net-wrap:active { cursor: grabbing; }
  #net-wrap::before {

<script>
'use strict';

/* ---------- utils ---------- */
function $(sel, el) { return (el || document).querySelector(sel); }
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function today() {
  var d = new Date();
  function z(n) { return (n < 10 ? '0' : '') + n; }
  return d.getFullYear() + '-' + z(d.getMonth() + 1) + '-' + z(d.getDate());
}
function fmtDate(iso) { return (iso || '').slice(0, 10); }

var toastEl = document.getElementById('toast');
var toastTimer = null;
function showToast(msg) {
  if (/失敗|エラー|無効|不正|拒否|NOT FOUND|ERROR/.test(msg)) beep('err');
  else if (/^(REGISTERED|SAVED|ENRICHED|APPLIED|ARCHIVED|RESTORED|APPENDED|EXPORTED|IMPORTED|COPIED|DELETED|TAG|AI SETTINGS)/.test(msg)) beep('ok');
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { toastEl.classList.remove('show'); }, 2400);
}

/* ---------- sound (WebAudio synth) ---------- */
var audioCtx = null, sndMaster = null, sndDelay = null, noiseBuf = null;
function soundOn() { return localStorage.getItem('kx-sound') !== 'off'; }
function audioReady() {
  if (!audioCtx) {
    var AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return false;
    audioCtx = new AC();
    // master bus: gain -> gentle lowpass -> destination (tames harsh highs)
    sndMaster = audioCtx.createGain();
    sndMaster.gain.value = 0.85;
    var lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 7000; lp.Q.value = 0.5;
    sndMaster.connect(lp); lp.connect(audioCtx.destination);
    // short feedback delay for a bit of "space" (send-based, thin and brief)
    sndDelay = audioCtx.createDelay(0.5);
    sndDelay.delayTime.value = 0.068;
    var fb = audioCtx.createGain(); fb.gain.value = 0.16;
    var wet = audioCtx.createGain(); wet.gain.value = 0.26;
    sndDelay.connect(fb); fb.connect(sndDelay); sndDelay.connect(wet); wet.connect(lp);
    // one reusable noise buffer for tactile transients
    noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.4, audioCtx.sampleRate);
    var nd = noiseBuf.getChannelData(0);
    for (var i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return true;
}
// ---- premium terminal sound design ----
// Doctrine: no oscillator pitch sweeps (reads as "pico-pico"). The identity is
// hard filtered-noise transients (tck), glassy filter-swept noise (shk/tzin),
// and quiet fixed-pitch low-mid tones for weight (vmm). Short, quiet, dry-ish.

// filtered noise: the click / scan / glass layer. Sweep the FILTER, never a pitch.
function nz(o) {
  var t = audioCtx.currentTime + (o.when || 0);
  var dur = o.dur || 0.03;
  var src = audioCtx.createBufferSource();
  src.buffer = noiseBuf; src.loop = true;
  var f = audioCtx.createBiquadFilter();
  f.type = o.type || 'bandpass';
  f.Q.value = o.q == null ? 1.2 : o.q;
  f.frequency.setValueAtTime(o.fc0 || 3000, t);
  if (o.fc1) f.frequency.exponentialRampToValueAtTime(o.fc1, t + dur);
  var g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(o.vol || 0.03, t + (o.atk || 0.003));
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  src.connect(f); f.connect(g); g.connect(sndMaster);
  if (o.send) g.connect(sndDelay);
  src.start(t); src.stop(t + dur + 0.02);
}
// fixed-pitch low/mid tone: body and warmth. Pitch stays put (or drifts a few Hz).
function tn(o) {
  var t = audioCtx.currentTime + (o.when || 0);
  var dur = o.dur || 0.12;
  var osc = audioCtx.createOscillator();
  osc.type = o.type || 'sine';
  osc.frequency.setValueAtTime(o.f, t);
  if (o.f1) osc.frequency.linearRampToValueAtTime(o.f1, t + dur);
  var g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(o.vol || 0.035, t + (o.atk || 0.01));
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g); g.connect(sndMaster);
  if (o.send) g.connect(sndDelay);
  osc.start(t); osc.stop(t + dur + 0.03);
}
function beep(kind) {
  if (!soundOn()) return;
  try {
    if (!audioReady()) return;
    switch (kind) {
      case 'tap': // micro tick: hard tiny click + faint low weight ("tck")
        nz({ type: 'highpass', fc0: 3800, q: 0.7, dur: 0.014, vol: 0.05 });
        tn({ f: 170, dur: 0.035, vol: 0.026, atk: 0.002 });
        break;
      case 'open': // click, then a short hologram ignition ("tck → vmm")
        nz({ type: 'highpass', fc0: 3800, q: 0.7, dur: 0.012, vol: 0.045 });
        nz({ fc0: 600, fc1: 2400, q: 2.2, dur: 0.17, vol: 0.02, when: 0.02, send: true });
        tn({ f: 196, f1: 202, dur: 0.16, vol: 0.03, type: 'triangle', atk: 0.02, when: 0.02, send: true });
        break;
      case 'ok': // quiet processed-complete: click + steady fifth dyad + glass dust ("tzin")
        nz({ type: 'highpass', fc0: 4200, q: 0.7, dur: 0.01, vol: 0.03 });
        tn({ f: 523.25, dur: 0.2, vol: 0.03, atk: 0.012, send: true });
        tn({ f: 784, dur: 0.17, vol: 0.018, atk: 0.012, send: true });
        nz({ fc0: 5200, q: 3, dur: 0.07, vol: 0.011, when: 0.02 });
        break;
      case 'err': // muted low alert: two close low sines beating + soft thud ("brt")
        tn({ f: 138, dur: 0.13, vol: 0.05, atk: 0.004 });
        tn({ f: 104, dur: 0.15, vol: 0.036, atk: 0.004 });
        nz({ type: 'lowpass', fc0: 420, q: 1, dur: 0.05, vol: 0.028 });
        break;
      case 'flip': // page scan: downward glassy sweep, tick at the end ("shk")
        nz({ fc0: 1600, fc1: 520, q: 1.6, dur: 0.12, vol: 0.03 });
        nz({ type: 'highpass', fc0: 3600, q: 0.7, dur: 0.012, vol: 0.026, when: 0.1 });
        break;
      case 'spin': // card whirl: rising glass scan + faint tone, brief tail ("tzin")
        nz({ fc0: 900, fc1: 4200, q: 2.4, dur: 0.2, vol: 0.02, send: true });
        tn({ f: 660, dur: 0.14, vol: 0.014, atk: 0.03, send: true });
        break;
    }
  } catch (e) {}
}

/* ---------- IndexedDB ---------- */
var DB_NAME = 'knowledge-codex', DB_STORE = 'records', FILE_STORE = 'files', db = null;
function openDB() {
  return new Promise(function (res, rej) {
    var r = indexedDB.open(DB_NAME, 2);
    r.onupgradeneeded = function () {
      if (!r.result.objectStoreNames.contains(DB_STORE)) r.result.createObjectStore(DB_STORE, { keyPath: 'id' });
      if (!r.result.objectStoreNames.contains(FILE_STORE)) r.result.createObjectStore(FILE_STORE, { keyPath: 'id' });
    };
    r.onsuccess = function () { res(r.result); };
    r.onerror = function () { rej(r.error); };
  });
}
function dbPutFile(f) {
  return new Promise(function (res, rej) {
    var tx = db.transaction(FILE_STORE, 'readwrite');
    tx.objectStore(FILE_STORE).put(f);
    tx.oncomplete = function () { res(); };
    tx.onerror = function () { rej(tx.error); };
  });
}
function dbGetFile(id) {
  return new Promise(function (res, rej) {
    var tx = db.transaction(FILE_STORE, 'readonly').objectStore(FILE_STORE).get(id);
    tx.onsuccess = function () { res(tx.result || null); };
    tx.onerror = function () { rej(tx.error); };
  });
}
function dbDelFile(id) {
  return new Promise(function (res, rej) {
    var tx = db.transaction(FILE_STORE, 'readwrite');
    tx.objectStore(FILE_STORE).delete(id);
    tx.oncomplete = function () { res(); };
    tx.onerror = function () { rej(tx.error); };
  });
}
function newFileId() {
  return 'F-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7);
}
function compressImage(file) {
  return new Promise(function (res, rej) {
    var url = URL.createObjectURL(file);
    var img = new Image();
    img.onload = function () {
      var MAX = 1280;
      var w = img.naturalWidth, h = img.naturalHeight;
      if (w > MAX || h > MAX) {
        var scale = MAX / Math.max(w, h);
        w = Math.round(w * scale); h = Math.round(h * scale);
      }
      var c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      c.toBlob(function (blob) {
        if (blob) res(blob); else rej(new Error('画像の変換に失敗'));
      }, 'image/jpeg', 0.85);
    };
    img.onerror = function () { URL.revokeObjectURL(url); rej(new Error('画像を読み込めません')); };
    img.src = url;
  });
}
function blobToDataURL(blob) {
  return new Promise(function (res, rej) {
    var fr = new FileReader();
    fr.onload = function () { res(fr.result); };
    fr.onerror = function () { rej(fr.error); };
    fr.readAsDataURL(blob);
  });
}

}

function byId(id) {
  for (var i = 0; i < state.records.length; i++) if (state.records[i].id === id) return state.records[i];

  return dbPut(rec);
}

          URL.revokeObjectURL(pending[i].url);
          pending.splice(i, 1);
          renderPending();
          return;
        }
        var att = e.target.closest('[data-pi]');
        if (att) showLightbox(pending[parseInt(att.dataset.pi, 10)].url);
      });
      function addPending(files) {
        [].forEach.call(files, function (f) {
          if (!/^image\//.test(f.type)) return;
          compressImage(f).then(function (blob) {
            pending.push({ blob: blob, name: f.name || 'pasted.jpg', url: URL.createObjectURL(blob) });
            renderPending();
            showToast('画像を追加しました（保存時に登録されます）');
          }).catch(function (e2) { showToast('画像の追加に失敗: ' + e2.message); });
        });
      }
      $('#f-img', v).addEventListener('change', function (e) {
        addPending(e.target.files);
        e.target.value = '';
      });
      v.addEventListener('paste', function (e) {
        if (e.clipboardData && e.clipboardData.files && e.clipboardData.files.length) {
          e.preventDefault();
          addPending(e.clipboardData.files);
        }
      });

      function doSave(goAI) {
        var title = $('#f-title', v).value.trim();
        if (!title) { showToast('タイトルを入力してください'); $('#f-title', v).focus(); return; }
        var cat = $('#f-cat', v).value;
        var sub = $('#f-sub', v).value.trim();
        var link = $('#f-link', v).value.trim();
        var rec = newRecord({
          title: title,
          oneLiner: $('#f-one', v).value.trim(),
          body: $('#f-body', v).value.trim(),
          category: sub ? cat + '/' + sub : cat,
          tags: $('#f-tags', v).value.split(/[,、]/).map(function (t) { return t.trim(); }).filter(Boolean),
          type: $('#f-type', v).value,
          importance: parseInt($('#f-imp', v).value, 10),
          links: link ? [link] : []
        });
        localStorage.setItem('kx-last-cat', cat);
        var fileSaves = pending.map(function (p) {
          var fid = newFileId();
          return dbPutFile({ id: fid, name: p.name, type: 'image/jpeg', blob: p.blob, createdAt: new Date().toISOString() })
            .then(function () { return fid; });
        });
        Promise.all(fileSaves).then(function (ids) {
          rec.attachments = ids;
          return saveRecord(rec);
        }).then(function () {
          pending.forEach(function (p) { URL.revokeObjectURL(p.url); });
          pending = [];
          renderPending();
          renderHome();
          if (goAI) { location.hash = '#/ai/' + rec.id; return; }
          showToast('REGISTERED ▸ ' + rec.id + ' 「' + rec.title.slice(0, 14) + '」');
          $('#f-title', v).value = ''; $('#f-one', v).value = ''; $('#f-body', v).value = '';
          $('#f-tags', v).value = ''; $('#f-link', v).value = ''; $('#f-sub', v).value = '';
          $('#f-title', v).focus();
        }).catch(function (e2) {
          showToast('保存に失敗: ' + e2.message);
        });
      }
      $('#f-save', v).addEventListener('click', function () { doSave(false); });
      $('#f-save-ai', v).addEventListener('click', function () { doSave(true); });
    });
  };
}

/* ---------- AI analysis (Phase 2: copy & paste flow) ---------- */
function buildPrompt(r) {
  var lines = [];
  lines.push('あなたは制作知識を整理するアシスタントです。以下の知識メモを分析し、指定のJSON形式「だけ」を出力してください。前後の説明文やコードフェンスは不要です。');
  lines.push('');
  lines.push('【知識メモ】');
  lines.push('タイトル: ' + r.title);
  if (r.oneLiner) lines.push('一言メモ: ' + r.oneLiner);
  if (r.body) lines.push('本文: ' + r.body);
  lines.push('カテゴリ: ' + (r.category || '未分類'));
  lines.push('タグ: ' + ((r.tags || []).join(', ') || 'なし'));
  lines.push('');
  var tags = allTags();
  if (tags.length) {
    lines.push('【既存タグ一覧（suggestedTagsはなるべくここから選ぶ。適切なものが無ければ新規でも可）】');
    lines.push(tags.join(', '));
    lines.push('');
  }
  lines.push('【カテゴリ大分類（suggestedCategoryは「大分類/中分類」の形式で）】');
  lines.push(CATS.join(' / '));
  lines.push('');
  lines.push('【出力形式（このJSONのみを出力）】');
  lines.push(JSON.stringify({
    summary: '2〜3文の要約',
    keyPoints: ['重要ポイントを3〜5個'],
    terms: [{ term: '技術語', desc: '1文の説明' }],
    useCases: ['この知識が使える場面'],
    nextKeywords: ['次に調べるキーワード'],
    nextExperiments: ['次に試す検証'],
    suggestedTags: ['タグ案を最大5個'],
    suggestedCategory: '大分類/中分類',
    importance: 2
  }, null, 2));
  return lines.join('\n');
}
function parseAIJson(text) {
  var t = String(text || '').trim();
  t = t.replace(/^```[a-zA-Z]*\s*/, '').replace(/```\s*$/, '');
  var a = t.indexOf('{'), b = t.lastIndexOf('}');
  if (a < 0 || b <= a) throw new Error('JSONが見つかりません');
  var o = JSON.parse(t.slice(a, b + 1));
  if (typeof o.summary !== 'string' || !o.summary) throw new Error('summary がありません');
  ['keyPoints', 'useCases', 'nextKeywords', 'nextExperiments', 'suggestedTags'].forEach(function (k) {
    o[k] = Array.isArray(o[k]) ? o[k].map(String) : [];
  });
  o.terms = (Array.isArray(o.terms) ? o.terms : []).map(function (x) {
    return { term: String((x && x.term) || ''), desc: String((x && x.desc) || '') };
  }).filter(function (x) { return x.term; });
  o.suggestedCategory = String(o.suggestedCategory || '');
  o.importance = Math.min(3, Math.max(1, parseInt(o.importance, 10) || 2));
  return o;
}
var AI_SCHEMA = {
  type: 'object',
  additionalProperties: false,
  required: ['summary', 'keyPoints', 'terms', 'useCases', 'nextKeywords', 'nextExperiments', 'suggestedTags', 'suggestedCategory', 'importance'],
  properties: {
    summary: { type: 'string', description: '2〜3文の要約' },
    keyPoints: { type: 'array', items: { type: 'string' }, description: '重要ポイント3〜5個' },
    terms: {
      type: 'array',
      items: {
        type: 'object', additionalProperties: false, required: ['term', 'desc'],

        }
        svel = Math.max(-12, Math.min(12, -lastDX * 0.45));
        if (Math.abs(svel) > 0.3) { beep('spin'); glide(); }
      });
      wrap.addEventListener('pointercancel', function (e) {
        if (pts[e.pointerId]) { delete pts[e.pointerId]; ptCount = Math.max(0, ptCount - 1); }
        down = null; prev2 = null;
      });
      wrap.addEventListener('wheel', function (e) {
        e.preventDefault();
        var wb = wrap.getBoundingClientRect();
        zoomAt(Math.exp(-e.deltaY * 0.0016), e.clientX - wb.left - wb.width / 2, e.clientY - wb.top - wb.height / 2);
        applyT();
      }, { passive: false });
      wrap.addEventListener('contextmenu', function (e) { e.preventDefault(); });
    });
  };
}

/* ---------- card collection ---------- */
function dots(n, max) {
  n = Math.max(0, Math.min(max, n || 0));
  var s = '';
  for (var i = 0; i < max; i++) s += i < n ? '●' : '○';
  return s;
}
function cardFaceHTML(r) {
  var img = (r.attachments && r.attachments.length)
    ? '<img data-cimg="' + esc(r.attachments[0]) + '" alt="">'
    : '<span class="glyph">' + (TYPE_CODE[r.type] || 'REC') + '</span>';
  return '<div class="ccard">' +
    '<i class="cc tl"></i><i class="cc tr"></i><i class="cc bl"></i><i class="cc br"></i>' +
    '<div class="chead"><span>' + esc(r.id) + '</span><span class="chip ' + esc(r.status) + '" style="margin-left:auto;">' + (STATUS[r.status] || r.status) + '</span></div>' +
    '<div class="cimg">' + img + '</div>' +
    '<div class="cbody">' +
      '<div class="ctitle">' + esc(r.title) + '</div>' +
      '<div class="cone">' + esc(r.oneLiner || '') + '</div>' +
    '</div>' +
    '<div class="cstats">' +
      '<div><span>IMPORTANCE</span><span>' + dots(r.importance, 3) + '</span></div>' +
      '<div><span>DEPLOYED</span><span>' + dots((r.usedIn || []).length, 3) + '</span></div>' +
      '<div><span>GROWTH</span><span>' + dots((r.appendLog || []).length, 3) + '</span></div>' +
    '</div>' +
    '<div class="cfoot"><span>' + esc(r.category || '未分類') + '</span><span>' + (TYPE_CODE[r.type] || '') + '</span></div>' +
  '</div>';
}
function hydrateCardImgs(container) {
  [].forEach.call(container.querySelectorAll('img[data-cimg]'), function (el) {
    dbGetFile(el.dataset.cimg).then(function (f) {
      if (f && f.blob) el.src = URL.createObjectURL(f.blob);
    });
  });
}
function viewCards(q) {
  return function () {
    var list = state.records.filter(function (r) { return r.status !== 'archived'; })
      .sort(function (a, b) { return a.id.localeCompare(b.id); });
    var perSide = 3;
    var mobile = matchMedia('(max-width: 760px)').matches;
    var spreadSize = mobile ? perSide : perSide * 2;
    var totalPages = Math.max(1, Math.ceil(list.length / spreadSize));
    var page = Math.min(totalPages - 1, Math.max(0, parseInt(q.get('p') || '0', 10) || 0));
    var html = '<div class="vpanel"><span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>' +
      vhead('COLLECTION', '知識カードブック — カードをタップで拡大') +
      '<div class="vbody">' +
      '<div class="booknav">' +
        '<button class="btn" id="b-prev" aria-label="前のページ">◀</button>' +
        '<span class="qresult" id="b-ind" style="margin:0;text-align:center;"></span>' +
        '<button class="btn" id="b-next" aria-label="次のページ">▶</button>' +
      '</div>' +
      '<div class="bookpages' + (mobile ? ' single' : '') + '" id="bpages"></div>' +
      '</div></div>';
    openView(html, function (v) {
      var bp = $('#bpages', v);
      function render() {
        var start = page * spreadSize;
        var slice = list.slice(start, start + spreadSize);
        var sides = mobile ? 1 : 2;
        var pagesHtml = '';
        for (var s = 0; s < sides; s++) {
          var cardsHtml = '';
          for (var i = 0; i < perSide; i++) {
            var r = slice[s * perSide + i];
            cardsHtml += '<div class="bslot">' +
              (r ? '<div class="bcard" data-id="' + esc(r.id) + '">' + cardFaceHTML(r) + '</div>'
                 : '<div class="bempty">EMPTY SLOT</div>') +
            '</div>';
          }
          pagesHtml += '<div class="bpage">' + cardsHtml + '</div>';
        }
        bp.innerHTML = pagesHtml;
        hydrateCardImgs(bp);
        $('#b-ind', v).innerHTML = 'PAGE <span>' + (page + 1) + '</span> / ' + totalPages + ' ── ' + list.length + ' CARDS';
        history.replaceState(null, '', '#/cards' + (page ? '?p=' + page : ''));
      }
      function flip(dir) {
        var np = Math.min(totalPages - 1, Math.max(0, page + dir));
        if (np === page) return;
        beep('flip');
        page = np;
        bp.classList.remove('flipL', 'flipR');
        void bp.offsetWidth;
        bp.classList.add(dir > 0 ? 'flipL' : 'flipR');
        render();
      }
      $('#b-prev', v).addEventListener('click', function () { flip(-1); });
      $('#b-next', v).addEventListener('click', function () { flip(1); });
      var tx = null;
      bp.addEventListener('touchstart', function (e) { tx = e.touches[0].clientX; }, { passive: true });
      bp.addEventListener('touchend', function (e) {
        if (tx === null) return;
        var dx = e.changedTouches[0].clientX - tx;
        tx = null;
        if (Math.abs(dx) > 60) flip(dx < 0 ? 1 : -1);
      }, { passive: true });
      bp.addEventListener('click', function (e) {
        var c = e.target.closest('.bcard');
        if (c) location.hash = '#/card/' + c.dataset.id;
      });
      render();
    });
  };
}
function viewCard(id) {
  return function () {
    var r = byId(id);
    if (!r) { showToast('CARD NOT FOUND: ' + id); location.hash = '#/cards'; return; }
    var html =
      '<div class="cardspace">' +
        '<div class="cshud"><span class="cid">CARD ' + esc(r.id) + '</span></div>' +
        '<div class="cstage" id="cstage"><div class="cobj" id="cobj">' +
          '<div class="cface">' + cardFaceHTML(r) + '</div>' +
          '<div class="cface backface"><div class="cback">' +
            '<i class="cc tl"></i><i class="cc tr"></i><i class="cc bl"></i><i class="cc br"></i>' +
            '<div class="cbem">◆</div>' +
            '<div class="cbt">KNOWLEDGE<br>CODEX</div>' +
            '<div class="cbs">PERSONAL KNOWLEDGE ARCHIVE</div>' +
          '</div></div>' +
        '</div></div>' +
        '<div class="chintbar">スワイプで回転 ／ カードをタップで詳細</div>' +
      '</div>';
    openView(html, function (v) {
      hydrateCardImgs(v);
      var obj = $('#cobj', v), stage = $('#cstage', v);
      var rot = -14, vel = 0.14, down = null, moved = false, lastX = 0, lastDX = 0, raf;
      function loop(t) {
        if (!document.body.contains(obj)) { cancelAnimationFrame(raf); return; }
        if (!down) {
          rot += vel;
          vel *= 0.98;
          if (Math.abs(vel) < 0.14) vel = vel < 0 ? -0.14 : 0.14;
        }
        var bobY = Math.sin(t * 0.0012) * 8;
        obj.style.transform = 'translateY(' + bobY.toFixed(1) + 'px) rotateY(' + rot.toFixed(2) + 'deg)';
        raf = requestAnimationFrame(loop);
      }
      raf = requestAnimationFrame(loop);
      stage.addEventListener('pointerdown', function (e) {
        down = { x: e.clientX, t: performance.now() };
        moved = false; lastX = e.clientX; lastDX = 0;
        try { stage.setPointerCapture(e.pointerId); } catch (err) {}
      });
      stage.addEventListener('pointermove', function (e) {
        if (!down) return;
        var dx = e.clientX - lastX;
        lastX = e.clientX;
        if (dx) lastDX = dx;
        if (Math.abs(e.clientX - down.x) > 8) moved = true;
        rot += dx * 0.45;
      });
      stage.addEventListener('pointerup', function (e) {
        if (!down) return;
        var wasTap = !moved && (performance.now() - down.t) < 400;
        down = null;
        if (wasTap) { location.hash = '#/detail/' + r.id; return; }
        beep('spin');
        vel = Math.max(-16, Math.min(16, lastDX * 0.6));
        if (Math.abs(vel) < 0.14) vel = 0.14;
      });
      stage.addEventListener('pointercancel', function () { down = null; });
    });
  };
}

/* ---------- router ---------- */
function route() {
  var h = location.hash || '#/';
  var m;
  if (h === '#/' || h === '' || h === '#') { closeView(); renderHome(); return; }
  if (h.indexOf('#/capture') === 0) { viewCapture()(); return; }
  if (h.indexOf('#/list') === 0) { viewList(parseQuery(h))(); return; }
  if ((m = h.match(/^#\/detail\/([A-Za-z]+-\d+)/))) { viewDetail(m[1])(); return; }
  if ((m = h.match(/^#\/ai\/([A-Za-z]+-\d+)/))) { viewAI(m[1])(); return; }
  if (h.indexOf('#/cards') === 0) { viewCards(parseQuery(h))(); return; }
  if ((m = h.match(/^#\/card\/([A-Za-z]+-\d+)/))) { viewCard(m[1])(); return; }
  if (h.indexOf('#/terms') === 0) { viewTerms(parseQuery(h))(); return; }
  if (h.indexOf('#/network') === 0) { viewNetwork()(); return; }
  if (h.indexOf('#/settings') === 0) { viewSettings()(); return; }
  closeView(); renderHome();
}
addEventListener('hashchange', route);

/* ---------- home wiring ---------- */
document.getElementById('go-home').addEventListener('click', function () { location.hash = '#/'; });
document.getElementById('go-settings').addEventListener('click', function () { location.hash = '#/settings'; });
document.getElementById('hud-back').addEventListener('click', function () { history.length > 1 ? history.back() : (location.hash = '#/'); });
document.getElementById('btn-capture').addEventListener('click', function () { location.hash = '#/capture'; });
document.getElementById('panel-records').addEventListener('click', function (e) {
  if (!e.target.closest('.kcard')) location.hash = '#/list';
});
bindCards(document.getElementById('recent-body'));
document.getElementById('archive-body').addEventListener('click', function (e) {
  var m = e.target.closest('.meter');
  if (m) { e.stopPropagation(); location.hash = '#/list?cat=' + encodeURIComponent(m.dataset.cat); }
});
document.getElementById('system-body').addEventListener('click', function (e) {
  var term = e.target.closest('[data-term]');
  if (term) { e.stopPropagation(); location.hash = '#/terms?q=' + encodeURIComponent(term.dataset.term); return; }
  var tag = e.target.closest('[data-tag]');
  if (tag) { e.stopPropagation(); location.hash = '#/list?q=' + encodeURIComponent(tag.dataset.tag); return; }
  var row = e.target.closest('[data-go]');
  if (row) { e.stopPropagation(); location.hash = row.dataset.go; }
});
var searchbox = document.getElementById('searchbox');
searchbox.addEventListener('keydown', function (e) {
  if (e.key === 'Enter') location.hash = '#/list?q=' + encodeURIComponent(searchbox.value.trim());
});
addEventListener('keydown', function (e) {
  if (e.key === '/' && !viewEl.classList.contains('open') &&
      !/INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)) {
    e.preventDefault();
    searchbox.focus();
  }
});

/* ---------- clock ---------- */
function tick() {
  var d = new Date();
  function z(n) { return (n < 10 ? '0' : '') + n; }
  document.getElementById('clock').textContent = z(d.getHours()) + ':' + z(d.getMinutes()) + ':' + z(d.getSeconds());
}
setInterval(tick, 1000);
tick();

/* ---------- background + parallax ---------- */
var canvas = document.getElementById('bg');
var ctx = canvas.getContext('2d');
var particles = [];
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
addEventListener('resize', resize);
resize();
var COUNT = Math.min(70, Math.floor(innerWidth / 14));
for (var i = 0; i < COUNT; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    z: Math.random() * 0.8 + 0.2,
    r: Math.random() * 1.6 + 0.4,
    vy: -(Math.random() * 0.22 + 0.05),
    a: Math.random() * 0.5 + 0.15
  });
}

var stage = document.getElementById('stage');
var targRx = 0, targRy = 0, curRx = 0, curRy = 0;
var lastInput = 0;

function fitStage() {
  if (matchMedia('(min-width: 761px)').matches) {
    var stageH = parseFloat(getComputedStyle(stage).height) || 620;
    var s = Math.min(1, (innerHeight - 64) / (stageH + 56), (innerWidth - 32) / 1100);
    stage.style.setProperty('--s', Math.max(0.5, s).toFixed(3));
  } else {
    stage.style.setProperty('--s', '1');
  }
}
addEventListener('resize', fitStage);
fitStage();

addEventListener('pointermove', function (e) {
  if (!matchMedia('(hover: hover)').matches) return;
  lastInput = performance.now();
  targRy = ((e.clientX / innerWidth) - 0.5) * 7;
  targRx = ((e.clientY / innerHeight) - 0.5) * -5;
});

function onOrient(e) {
  if (e.gamma == null && e.beta == null) return;
  lastInput = performance.now();
  var g = Math.max(-25, Math.min(25, e.gamma || 0));
  var b = Math.max(-25, Math.min(25, (e.beta || 45) - 45));
  targRy = g / 25 * 5;
  targRx = b / 25 * -3;
}
if (!matchMedia('(hover: hover)').matches) {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    var askGyro = function () {
      DeviceOrientationEvent.requestPermission().then(function (r) {
        if (r === 'granted') addEventListener('deviceorientation', onOrient);
      }).catch(function () {});
      removeEventListener('touchend', askGyro);
    };
    addEventListener('touchend', askGyro);
  } else {
    addEventListener('deviceorientation', onOrient);
  }
}

function draw(t) {
  t = t || 0;
  if (t - lastInput > 4000) {
    targRy = Math.sin(t * 0.00035) * 2.2;
    targRx = Math.cos(t * 0.00027) * 1.4;
  }
  curRx += (targRx - curRx) * 0.055;
  curRy += (targRy - curRy) * 0.055;
  stage.style.setProperty('--rx', curRx.toFixed(3) + 'deg');
  stage.style.setProperty('--ry', curRy.toFixed(3) + 'deg');

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  var g = ctx.createRadialGradient(canvas.width / 2, canvas.height * 0.42, 40, canvas.width / 2, canvas.height * 0.42, canvas.width * 0.7);
  g.addColorStop(0, 'rgba(24,48,120,0.28)');
  g.addColorStop(1, 'rgba(3,7,17,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  var parX = curRy / 7, parY = curRx / 5;
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    p.y += p.vy;
    if (p.y < -4) { p.y = canvas.height + 4; p.x = Math.random() * canvas.width; }
    ctx.beginPath();
    ctx.arc(p.x + parX * 46 * p.z, p.y - parY * 30 * p.z, p.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(122,160,255,' + p.a + ')';
    ctx.fill();
  }
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

/* ---------- boot ---------- */
openDB().then(function (d) {
  db = d;
  return dbAll();
}).then(function (recs) {
  if (recs.length === 0) {
    var seeds = seedRecords();
    state.records = seeds;
    return Promise.all(seeds.map(dbPut)).then(function () { return seeds; });
  }
  state.records = recs;
}).then(function () {
  renderHome();
  route();
}).catch(function (err) {
  showToast('DB初期化エラー: ' + err);
});
</script>
