<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#04070d">
<title>Knowledge Codex</title>
<style>
  :root {
    --bg: #04070d;
    --panel: rgba(11, 28, 46, 0.62);
    --panel-solid: rgba(9, 22, 38, 0.96);
    --line: #1b3a52;
    --line-bright: #2fb9d8;
    --cyan: #7fe8ff;
    --cyan-dim: #5fc9e8;
    --text: #d8f4ff;
    --muted: #4d7d9c;
    --amber: #ffd98a;
    --green: #9fe6b8;
    --mono: Consolas, "Courier New", monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
  }

  #bg { position: fixed; inset: 0; z-index: 0; }

  .hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 30;
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    padding: 12px 18px 10px;
    font-family: var(--mono); font-size: 12px; letter-spacing: 1px;
    color: var(--cyan-dim);
    background: linear-gradient(180deg, rgba(4,7,13,0.9), transparent);
    pointer-events: none;
  }
  .hud::after {
    content: ""; position: absolute; left: 18px; right: 18px; bottom: 0; height: 1px;
    background: linear-gradient(90deg, var(--line-bright), rgba(47,185,216,0.06) 60%, transparent);
  }
  .hud .brand { color: var(--cyan); font-size: 14px; letter-spacing: 3px; cursor: pointer; pointer-events: auto; }
  .hud .right { display: flex; align-items: center; gap: 12px; pointer-events: auto; }
  .hud .stats { text-align: right; }
  .hud .stats span { color: var(--cyan); }
  .hud .gear {
    cursor: pointer; color: var(--cyan-dim); border: 1px solid var(--line);
    border-radius: 4px; padding: 3px 8px; font-size: 12px; background: rgba(6,16,28,0.6);
  }
  .hud .gear:hover { color: var(--cyan); border-color: var(--line-bright); }

  .scene {
    position: fixed; inset: 0; z-index: 10;
    perspective: 1400px; perspective-origin: 50% 42%;
    display: flex; align-items: center; justify-content: center;
  }
  .stage {
    position: relative;
    width: min(1080px, 96vw); height: 620px;
    transform-style: preserve-3d;
    transform: rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)) scale(var(--s, 1));
  }

  .floor {
    position: absolute; left: 50%; top: 66%;
    width: 1800px; height: 1100px;
    transform: translate(-50%, -18%) rotateX(76deg) translateZ(-120px);
    background:
      repeating-linear-gradient(0deg, rgba(47,185,216,0.16) 0 1px, transparent 1px 60px),
      repeating-linear-gradient(90deg, rgba(47,185,216,0.16) 0 1px, transparent 1px 60px);
    -webkit-mask-image: radial-gradient(ellipse 50% 44% at 50% 34%, #000 35%, transparent 78%);
    mask-image: radial-gradient(ellipse 50% 44% at 50% 34%, #000 35%, transparent 78%);
    pointer-events: none;
  }

  .panel {
    position: absolute;
    background: var(--panel);
    border: 1px solid var(--line-bright);
    border-radius: 6px;
    box-shadow: 0 0 26px rgba(47,185,216,0.22), inset 0 0 46px rgba(47,185,216,0.05);
    cursor: pointer;
  }
  .panel::after {
    content: ""; position: absolute; inset: 0; border-radius: 6px; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(127,232,255,0.028) 0 1px, transparent 1px 3px);
  }
  .panel:hover, .panel:active {
    box-shadow: 0 0 40px rgba(127,232,255,0.4), inset 0 0 46px rgba(47,185,216,0.1);
    border-color: var(--cyan);
  }
  .corner { position: absolute; width: 14px; height: 14px; pointer-events: none; z-index: 2; }
  .corner.tl { top: -2px; left: -2px; border-top: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
  .corner.tr { top: -2px; right: -2px; border-top: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }
  .corner.bl { bottom: -2px; left: -2px; border-bottom: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
  .corner.br { bottom: -2px; right: -2px; border-bottom: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }

  .p-head {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 2px; color: var(--cyan);
    padding: 10px 12px 8px;
    border-bottom: 1px solid rgba(47,185,216,0.35);
    background: linear-gradient(90deg, rgba(47,185,216,0.14), transparent 70%);
  }
  .p-head .dot { width: 6px; height: 6px; background: var(--cyan); box-shadow: 0 0 6px var(--cyan); border-radius: 1px; }
  .p-head .jp { margin-left: auto; color: var(--muted); letter-spacing: 0; font-family: "Segoe UI", system-ui, sans-serif; font-size: 11px; }
  .p-body { padding: 12px; }

  .float { animation: bob 7s ease-in-out infinite alternate; }
  .float.d1 { animation-delay: -2.2s; }
  .float.d2 { animation-delay: -4.4s; }
  @keyframes bob { from { transform: translateY(-4px); } to { transform: translateY(5px); } }

  #panel-archive { left: 0; top: 70px; width: 290px; transform: rotateY(26deg) translateZ(-30px); }
  #panel-records { left: 50%; top: 26px; width: 450px; margin-left: -225px; transform: translateZ(70px); }
  #panel-system { right: 0; top: 70px; width: 290px; transform: rotateY(-26deg) translateZ(-30px); }
  #console { left: 50%; bottom: 10px; width: 640px; margin-left: -320px; transform: translateZ(150px) rotateX(24deg); cursor: default; }

  .meter { margin-bottom: 10px; cursor: pointer; }
  .meter:hover .lbl span:first-child { color: var(--cyan); }
  .meter .lbl { display: flex; justify-content: space-between; font-size: 12px; color: var(--text); margin-bottom: 4px; }
  .meter .lbl span:last-child { font-family: var(--mono); color: var(--cyan); }
  .meter .bar { height: 4px; background: rgba(47,185,216,0.14); border-radius: 2px; overflow: hidden; }
  .meter .bar i { display: block; height: 100%; background: linear-gradient(90deg, var(--line-bright), var(--cyan)); box-shadow: 0 0 6px rgba(127,232,255,0.6); }

  .kcard {
    display: flex; gap: 10px; align-items: stretch;
    background: rgba(13, 30, 48, 0.75);
    border: 1px solid rgba(47,185,216,0.4);
    border-radius: 5px;
    padding: 9px 10px;
    margin-bottom: 9px;
    position: relative;
    cursor: pointer;
  }
  .kcard:hover { border-color: var(--cyan); background: rgba(18, 40, 62, 0.85); }
  .kcard .thumb {
    flex: 0 0 52px; height: 52px; align-self: center;
    border: 1px solid rgba(47,185,216,0.5); border-radius: 4px;
    background:
      linear-gradient(135deg, transparent 42%, rgba(47,185,216,0.35) 43%, transparent 44%),
      linear-gradient(135deg, transparent 56%, rgba(47,185,216,0.25) 57%, transparent 58%),
      rgba(6, 16, 28, 0.8);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 10px; color: var(--muted);
  }
  .kcard .info { min-width: 0; flex: 1; }
  .kcard .row1 { display: flex; align-items: center; gap: 8px; }
  .kcard .kid { font-family: var(--mono); font-size: 11px; color: var(--cyan-dim); }
  .kcard .star { margin-left: auto; font-size: 14px; color: var(--muted); padding: 0 2px; }
  .kcard .star.on { color: var(--cyan); text-shadow: 0 0 6px rgba(127,232,255,0.8); }
  .kcard .title { font-size: 13px; font-weight: 600; color: var(--text); margin: 2px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kcard .one { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kcard .row2 { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
  .imp { font-family: var(--mono); font-size: 10px; color: var(--cyan-dim); letter-spacing: 1px; }
  .tag { font-size: 10px; color: var(--cyan-dim); border: 1px solid rgba(47,185,216,0.45); border-radius: 3px; padding: 1px 6px; }
  .chip { font-size: 10px; border-radius: 3px; padding: 1px 7px; margin-left: auto; white-space: nowrap; }
  .chip.enriched { color: var(--cyan); background: rgba(47,185,216,0.16); border: 1px solid rgba(47,185,216,0.5); }
  .chip.captured { color: var(--amber); background: rgba(255,217,138,0.1); border: 1px solid rgba(255,217,138,0.4); }
  .chip.applied { color: var(--green); background: rgba(159,230,184,0.1); border: 1px solid rgba(159,230,184,0.4); }
  .chip.archived { color: var(--muted); background: rgba(77,125,156,0.1); border: 1px solid rgba(77,125,156,0.4); }

  .sysrow { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px dashed rgba(47,185,216,0.2); font-size: 12px; cursor: pointer; }
  .sysrow:hover span:first-child { color: var(--cyan); }
  .sysrow:last-child { border-bottom: none; cursor: default; }
  .sysrow .v { font-family: var(--mono); color: var(--cyan); font-size: 16px; }
  .sysrow .v.warn { color: var(--amber); }
  .terms { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .terms .tag { cursor: pointer; }
  .terms .tag:hover { color: var(--cyan); border-color: var(--cyan); }

  .console-inner { display: flex; gap: 10px; padding: 12px; align-items: center; }
  .search {
    flex: 1; display: flex; align-items: center; gap: 8px;
    background: rgba(6, 16, 28, 0.8);
    border: 1px solid var(--line); border-radius: 5px;
    padding: 9px 12px;
  }
  .search input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-size: 13px; font-family: inherit; min-width: 0;
  }
  .search input::placeholder { color: var(--muted); }
  .search .key { font-family: var(--mono); font-size: 10px; color: var(--muted); border: 1px solid var(--line); border-radius: 3px; padding: 1px 5px; }
  .capture {
    font-family: var(--mono); font-size: 13px; letter-spacing: 1px;
    color: #04121c; background: linear-gradient(180deg, var(--cyan), var(--cyan-dim));
    border: none; border-radius: 5px; padding: 10px 18px; cursor: pointer;
    box-shadow: 0 0 16px rgba(127,232,255,0.45);
    font-weight: 700;
  }
  .capture:active { transform: scale(0.97); }

  #view {
    position: fixed; inset: 0; z-index: 25; display: none;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    background: rgba(4, 7, 13, 0.8);
    padding: 62px 14px 28px;
  }
  #view.open { display: block; }
  .vpanel {
    position: relative; max-width: 880px; margin: 0 auto;
    background: var(--panel-solid);
    border: 1px solid var(--line-bright); border-radius: 6px;
    box-shadow: 0 0 34px rgba(47,185,216,0.28);
    animation: viewIn 0.22s ease-out;
  }
  @keyframes viewIn { from { opacity: 0; transform: scale(0.965) translateY(8px); } to { opacity: 1; transform: none; } }
  .vhead {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 12px; letter-spacing: 2px; color: var(--cyan);
    padding: 12px 14px;
    border-bottom: 1px solid rgba(47,185,216,0.35);
    background: linear-gradient(90deg, rgba(47,185,216,0.14), transparent 70%);
  }
  .vhead .back {
    cursor: pointer; color: var(--cyan-dim); border: 1px solid var(--line);
    border-radius: 4px; padding: 3px 10px; font-size: 11px; white-space: nowrap;
  }
  .vhead .back:hover { color: var(--cyan); border-color: var(--line-bright); }
  .vhead .jp { margin-left: auto; color: var(--muted); letter-spacing: 0; font-family: "Segoe UI", system-ui, sans-serif; font-size: 11px; }
  .vbody { padding: 16px 16px 20px; }

  .field { margin-bottom: 13px; }
  .field label { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; color: var(--cyan-dim); margin-bottom: 5px; }
  .field label em { font-style: normal; color: var(--amber); }
  input[type="text"], input[type="search"], input[type="url"], textarea, select {
    width: 100%; background: rgba(6, 16, 28, 0.85);
    border: 1px solid var(--line); border-radius: 5px;
    color: var(--text); padding: 9px 12px; font-size: 14px; font-family: inherit;
    outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--cyan); box-shadow: 0 0 8px rgba(127,232,255,0.25); }
  textarea { resize: vertical; min-height: 90px; }
  select { -webkit-appearance: none; appearance: none; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btnrow { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
  .btn {
    font-family: var(--mono); font-size: 12px; letter-spacing: 1px;
    color: var(--cyan); background: rgba(47,185,216,0.08);
    border: 1px solid var(--line-bright); border-radius: 5px;
    padding: 9px 16px; cursor: pointer;
  }
  .btn:hover { background: rgba(47,185,216,0.18); }
  .btn:active { transform: scale(0.97); }
  .btn.primary { color: #04121c; background: linear-gradient(180deg, var(--cyan), var(--cyan-dim)); border: none; font-weight: 700; box-shadow: 0 0 14px rgba(127,232,255,0.4); }
  .btn.danger { color: #ff9a9a; border-color: rgba(255,120,120,0.5); background: rgba(255,120,120,0.06); }
  details.adv { margin-top: 4px; }
  details.adv summary { cursor: pointer; font-family: var(--mono); font-size: 11px; letter-spacing: 1px; color: var(--cyan-dim); padding: 6px 0; list-style: none; }
  details.adv summary::before { content: "▸ "; }
  details.adv[open] summary::before { content: "▾ "; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
  .filters select { width: auto; padding: 6px 26px 6px 10px; font-size: 12px; background-image: linear-gradient(45deg, transparent 50%, var(--cyan-dim) 50%), linear-gradient(135deg, var(--cyan-dim) 50%, transparent 50%); background-position: calc(100% - 14px) 55%, calc(100% - 10px) 55%; background-size: 4px 4px; background-repeat: no-repeat; }
  .filters .fav-toggle { font-size: 13px; padding: 6px 12px; }
  .filters .fav-toggle.on { color: var(--cyan); background: rgba(47,185,216,0.2); }
  .qresult { font-family: var(--mono); font-size: 11px; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }
  .qresult span { color: var(--cyan); }
  .listgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 10px; }
  .listgrid .kcard { margin-bottom: 0; }
  .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 34px 0; }
  .empty .big { font-family: var(--mono); color: var(--cyan-dim); font-size: 15px; letter-spacing: 2px; margin-bottom: 8px; }

  .dhead { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .dhead .kid { font-family: var(--mono); font-size: 13px; color: var(--cyan-dim); }
  .dhead .star { cursor: pointer; font-size: 18px; color: var(--muted); }
  .dhead .star.on { color: var(--cyan); text-shadow: 0 0 8px rgba(127,232,255,0.8); }
  .dtitle { font-size: 19px; font-weight: 700; color: var(--text); margin: 4px 0 2px; }
  .done { font-size: 13px; color: var(--cyan-dim); margin-bottom: 10px; }
  .dmeta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .dmeta .cat { font-size: 11px; color: var(--text); background: rgba(47,185,216,0.12); border: 1px solid rgba(47,185,216,0.4); border-radius: 3px; padding: 2px 8px; }
  .dmeta .date { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-left: auto; }
  .sec { border: 1px solid rgba(47,185,216,0.25); border-radius: 5px; margin-bottom: 12px; overflow: hidden; }
  .sec .shead { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--cyan-dim); padding: 7px 12px; background: rgba(47,185,216,0.07); border-bottom: 1px solid rgba(47,185,216,0.2); }
  .sec .sbody { padding: 12px; font-size: 13px; line-height: 1.8; color: var(--text); white-space: pre-wrap; word-break: break-word; }
  .sec .sbody.dim { color: var(--muted); font-size: 12px; }
  .sec ul { margin: 0 0 0 18px; }
  .sec .term { margin-bottom: 6px; }
  .sec .term b { color: var(--cyan); font-weight: 600; }
  .loglist .log { border-bottom: 1px dashed rgba(47,185,216,0.2); padding: 6px 0; font-size: 12px; }
  .loglist .log:last-child { border-bottom: none; }
  .loglist .log .d { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-right: 8px; }

  .sec.proposal { border-style: dashed; border-color: rgba(255,217,138,0.45); }
  .sec.proposal .shead { color: var(--amber); background: rgba(255,217,138,0.06); border-bottom-color: rgba(255,217,138,0.25); }
  .pchip {
    display: inline-block; font-size: 12px; color: var(--amber);
    border: 1px dashed rgba(255,217,138,0.55); border-radius: 3px;
    padding: 3px 10px; margin: 0 6px 6px 0; cursor: pointer; user-select: none;
  }
  .pchip.on { color: var(--cyan); border: 1px solid var(--line-bright); background: rgba(47,185,216,0.14); }
  .pchip.have { color: var(--muted); border: 1px solid var(--line); cursor: default; }
  .step {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px; color: var(--cyan);
    margin: 16px 0 8px;
  }
  .step .n {
    width: 20px; height: 20px; flex: 0 0 20px; border: 1px solid var(--line-bright); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 11px;
    box-shadow: 0 0 8px rgba(47,185,216,0.3);
  }
  .copybox { font-family: var(--mono); font-size: 11px; min-height: 140px; margin-top: 8px; }
  .applyform { display: none; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .applyform.show { display: flex; }
  .applyform input { flex: 1; min-width: 140px; }

  #toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
    z-index: 40; opacity: 0; pointer-events: none;
    font-family: var(--mono); font-size: 12px; letter-spacing: 1px; color: var(--cyan);
    background: rgba(6, 18, 30, 0.94); border: 1px solid var(--line-bright); border-radius: 5px;
    padding: 10px 16px; box-shadow: 0 0 20px rgba(47,185,216,0.35);
    transition: opacity 0.25s, transform 0.25s;
    max-width: 90vw; text-align: center;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (min-width: 761px) and (max-height: 560px) {
    .scene { perspective-origin: 50% 46%; }
    .stage { height: 480px; }
    #panel-records { top: 0; }
    #panel-archive, #panel-system { top: 34px; }
    #console { bottom: 0; }
    .kcard { padding: 7px 9px; }
    .kcard .thumb { flex-basis: 44px; height: 44px; }
    #view { padding: 52px 40px 20px; }
    .vpanel { max-width: 640px; }
    .vbody { padding: 12px 14px 16px; }
    .field { margin-bottom: 10px; }
    input[type="text"], input[type="search"], input[type="url"], textarea, select { padding: 7px 10px; font-size: 13px; }
    textarea { min-height: 64px; }
  }

  @media (max-width: 760px) {
    body { overflow: auto; }
    .scene { position: static; perspective: 900px; display: block; padding: 64px 12px 24px; height: auto; min-height: 100%; }
    .stage { width: 100%; height: auto; display: flex; flex-direction: column; gap: 16px; transform: rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)); }
    .floor { position: fixed; top: auto; bottom: -46%; }
    .panel { position: static; width: 100% !important; margin: 0 !important; }
    #panel-archive { transform: rotateY(5deg); }
    #panel-records { transform: translateZ(20px); order: -1; }
    #panel-system { transform: rotateY(-5deg); }
    #console { transform: none; order: -2; }
    .hud .stats { font-size: 10px; }
    .grid2 { grid-template-columns: 1fr; }
    #view { padding: 58px 8px 20px; }
    .vbody { padding: 12px 12px 16px; }
    .dmeta .date { margin-left: 0; width: 100%; }
  }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<header class="hud">
  <div class="brand" id="go-home">KNOWLEDGE CODEX</div>
  <div class="right">
    <div class="stats">RECORDS: <span id="st-rec">0</span> // TAGS: <span id="st-tag">0</span><br>SYNC <span id="clock">--:--:--</span></div>
    <div class="gear" id="go-settings" title="設定">⚙</div>
  </div>
</header>

<div class="scene">
  <div class="stage" id="stage">
    <div class="floor"></div>

    <section class="panel float d1" id="panel-archive">
      <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
      <div class="p-head"><span class="dot"></span>ARCHIVE<span class="jp">カテゴリ別</span></div>
      <div class="p-body" id="archive-body"></div>
    </section>

    <section class="panel float" id="panel-records">
      <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
      <div class="p-head"><span class="dot"></span>RECENT RECORDS<span class="jp">最近の知識 — タップで一覧へ</span></div>
      <div class="p-body" id="recent-body"></div>
    </section>

    <section class="panel float d2" id="panel-system">
      <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
      <div class="p-head"><span class="dot"></span>SYSTEM<span class="jp">状態</span></div>
      <div class="p-body" id="system-body"></div>
    </section>

    <section class="panel" id="console">
      <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
      <div class="console-inner">
        <div class="search">
          <span style="color:var(--muted);">⌕</span>
          <input id="searchbox" type="search" placeholder="知識を検索…（タイトル / タグ / 本文）" enterkeyhint="search">
          <span class="key">/</span>
        </div>
        <button class="capture" id="btn-capture">+ CAPTURE</button>
      </div>
    </section>
  </div>
</div>

<div id="view"></div>
<div id="toast"></div>

<script>
'use strict';

/* ---------- utils ---------- */
function $(sel, el) { return (el || document).querySelector(sel); }
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function today() {
  var d = new Date();
  function z(n) { return (n < 10 ? '0' : '') + n; }
  return d.getFullYear() + '-' + z(d.getMonth() + 1) + '-' + z(d.getDate());
}
function fmtDate(iso) { return (iso || '').slice(0, 10); }

var toastEl = document.getElementById('toast');
var toastTimer = null;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { toastEl.classList.remove('show'); }, 2400);
}

/* ---------- constants ---------- */
var CATS = ['CG', 'UI・UX', 'Design', 'Coding', 'AI・Prompt', 'Workflow'];
var TYPES = { solution: '解決策', insight: '気づき', term: '用語', recipe: '手順', prompt: 'プロンプト', reference: '参考' };
var TYPE_CODE = { solution: 'SOL', insight: 'INS', term: 'TRM', recipe: 'RCP', prompt: 'PRM', reference: 'REF' };
var STATUS = { captured: '未整理', enriched: 'AI整理済', applied: '使用済', archived: '保管' };

/* ---------- IndexedDB ---------- */
var DB_NAME = 'knowledge-codex', DB_STORE = 'records', db = null;
function openDB() {
  return new Promise(function (res, rej) {
    var r = indexedDB.open(DB_NAME, 1);
    r.onupgradeneeded = function () { r.result.createObjectStore(DB_STORE, { keyPath: 'id' }); };
    r.onsuccess = function () { res(r.result); };
    r.onerror = function () { rej(r.error); };
  });
}
function dbAll() {
  return new Promise(function (res, rej) {
    var tx = db.transaction(DB_STORE, 'readonly').objectStore(DB_STORE).getAll();
    tx.onsuccess = function () { res(tx.result || []); };
    tx.onerror = function () { rej(tx.error); };
  });
}
function dbPut(rec) {
  return new Promise(function (res, rej) {
    var tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(rec);
    tx.oncomplete = function () { res(); };
    tx.onerror = function () { rej(tx.error); };
  });
}
function dbDel(id) {
  return new Promise(function (res, rej) {
    var tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).delete(id);
    tx.oncomplete = function () { res(); };
    tx.onerror = function () { rej(tx.error); };
  });
}

/* ---------- state ---------- */
var state = { records: [] };
function byId(id) {
  for (var i = 0; i < state.records.length; i++) if (state.records[i].id === id) return state.records[i];
  return null;
}
function nextId() {
  var max = 0;
  state.records.forEach(function (r) {
    var n = parseInt((r.id || '').split('-')[1], 10);
    if (n > max) max = n;
  });
  return 'KX-' + String(max + 1).padStart(4, '0');
}
function saveRecord(rec) {
  rec.updatedAt = new Date().toISOString();
  var i = state.records.findIndex(function (r) { return r.id === rec.id; });
  if (i >= 0) state.records[i] = rec; else state.records.push(rec);
  return dbPut(rec);
}
function newRecord(o) {
  return Object.assign({
    id: nextId(), title: '', oneLiner: '', body: '',
    attachments: [], links: [], category: '', tags: [],
    type: 'insight', importance: 1, status: 'captured', favorite: false,
    ai: null, appendLog: [], usedIn: [],
    createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
  }, o || {});
}
function allTags() {
  var set = {};
  state.records.forEach(function (r) { (r.tags || []).forEach(function (t) { set[t] = 1; }); });
  return Object.keys(set).sort();
}

/* ---------- seed ---------- */
function seedRecords() {
  var t = new Date().toISOString();
  return [
    newRecord({
      id: 'KX-0001', title: '深度フェードで水際を馴染ませる',
      oneLiner: 'Depth Fadeで交差部の硬いエッジを消す',
      body: '水面メッシュと地形の交差ラインがくっきり出て嘘っぽい。Depth Fadeノードでシーン深度との差からオパシティ/色をフェードさせると、水際が柔らかく馴染む。',
      category: 'CG/Material', tags: ['Depth Fade', 'Water', 'Material'],
      type: 'solution', importance: 1, status: 'captured', createdAt: t, updatedAt: t
    }),
    newRecord({
      id: 'KX-0002', title: 'サイバーUIは便利さが先',
      oneLiner: '装飾は便利な情報設計の上に載せる',
      body: 'サイバーな装飾は便利な情報設計の上に載せるべき。見た目がかっこよくても、入力や検索が面倒なら使わなくなる。',
      category: 'UI・UX/サイバーデザイン', tags: ['UI', 'Cyber', 'Usability'],
      type: 'insight', importance: 3, status: 'applied',
      usedIn: [{ project: 'Knowledge Codex', date: today(), note: 'このアプリのUI設計方針として採用' }],
      appendLog: [{ date: today(), text: '登録は「タイトル＋一言メモ」だけで成立させる設計にした' }],
      createdAt: t, updatedAt: t
    }),
    newRecord({
      id: 'KX-0003', title: '水面の動きがゴムっぽく見える原因',
      oneLiner: '水っぽさは高さ変位でなく法線・反射・リップルで出す',
      body: 'WPOで高さ変位を大きく動かしすぎると、海面が水ではなく弾性シートのように見える。水っぽさは高さ変位より、法線・反射・細かなリップル・減衰で出す。',
      category: 'CG/水表現', tags: ['WPO', 'Normal', 'Water', 'Reflection'],
      type: 'solution', importance: 2, status: 'enriched', favorite: true,
      ai: {
        summary: '海面のゴム感は「高さ変位のスケール過多」が原因。水らしさは形状でなく、法線の細かな揺れ・反射の歪み・リップルの減衰で表現するのが定石。',
        keyPoints: ['WPO（高さ変位）は微小に抑える', '主役は法線と反射の揺れ', 'リップルは距離減衰させる'],
        terms: [
          { term: 'WPO', desc: 'World Position Offset。頂点をマテリアルから動かす仕組み' },
          { term: 'Height Field', desc: '高さ場。水面の凹凸を1枚のスカラー場で表す' }
        ],
        useCases: ['夜の海アプリの水面調整', 'リアルタイム水面全般'],
        nextKeywords: ['Gerstner Wave', 'Detail Normal'],
        nextExperiments: ['WPOを1/10にして法線强度を上げるABテスト'],
        suggestedTags: [], suggestedCategory: '', relatedIds: ['KX-0001']
      },
      createdAt: t, updatedAt: t
    })
  ];
}

/* ---------- shared card ---------- */
function cardHTML(r) {
  var tags = (r.tags || []).slice(0, 3).map(function (t) { return '<span class="tag">' + esc(t) + '</span>'; }).join('');
  var more = (r.tags || []).length > 3 ? '<span class="tag">+' + ((r.tags || []).length - 3) + '</span>' : '';
  var imp = '◆◆◆'.slice(0, r.importance) + '◇◇◇'.slice(0, 3 - r.importance);
  return '<div class="kcard" data-id="' + esc(r.id) + '">' +
    '<div class="thumb">' + (TYPE_CODE[r.type] || 'REC') + '</div>' +
    '<div class="info">' +
      '<div class="row1"><span class="kid">' + esc(r.id) + '</span>' +
      '<span class="star' + (r.favorite ? ' on' : '') + '" data-star="' + esc(r.id) + '">★</span></div>' +
      '<div class="title">' + esc(r.title) + '</div>' +
      '<div class="one">' + esc(r.oneLiner || (r.body || '').slice(0, 40)) + '</div>' +
      '<div class="row2"><span class="imp">' + imp + '</span>' + tags + more +
      '<span class="chip ' + esc(r.status) + '">' + (STATUS[r.status] || r.status) + '</span></div>' +
    '</div></div>';
}
function bindCards(container) {
  container.addEventListener('click', function (e) {
    var star = e.target.closest('[data-star]');
    if (star) {
      e.stopPropagation();
      var rec = byId(star.dataset.star);
      if (rec) {
        rec.favorite = !rec.favorite;
        saveRecord(rec).then(function () { star.classList.toggle('on', rec.favorite); renderHome(); });
      }
      return;
    }
    var card = e.target.closest('.kcard');
    if (card) { e.stopPropagation(); location.hash = '#/detail/' + card.dataset.id; }
  });
}

/* ---------- home ---------- */
function renderHome() {
  var recs = state.records;
  var active = recs.filter(function (r) { return r.status !== 'archived'; });

  document.getElementById('st-rec').textContent = active.length;
  document.getElementById('st-tag').textContent = allTags().length;

  var counts = {};
  CATS.forEach(function (c) { counts[c] = 0; });
  active.forEach(function (r) {
    var c = (r.category || '').split('/')[0];
    if (counts[c] == null) counts[c] = 0;
    counts[c]++;
  });
  var max = 1;
  Object.keys(counts).forEach(function (c) { if (counts[c] > max) max = counts[c]; });
  var keys = CATS.slice();
  Object.keys(counts).forEach(function (c) { if (keys.indexOf(c) < 0 && counts[c] > 0) keys.push(c); });
  document.getElementById('archive-body').innerHTML = keys.map(function (c) {
    return '<div class="meter" data-cat="' + esc(c) + '"><div class="lbl"><span>' + esc(c) + '</span><span>' + counts[c] + '</span></div>' +
      '<div class="bar"><i style="width:' + Math.round(counts[c] / max * 100) + '%"></i></div></div>';
  }).join('');

  var recent = active.slice().sort(function (a, b) { return (b.updatedAt || '').localeCompare(a.updatedAt || ''); }).slice(0, 3);
  document.getElementById('recent-body').innerHTML =
    recent.length ? recent.map(cardHTML).join('') :
    '<div class="empty"><div class="big">NO RECORDS</div>+ CAPTURE から最初の知識を登録</div>';

  var inbox = active.filter(function (r) { return r.status === 'captured'; }).length;
  var applied = active.filter(function (r) { return r.status === 'applied'; }).length;
  var month = new Date().toISOString().slice(0, 7);
  var monthly = active.filter(function (r) { return (r.createdAt || '').slice(0, 7) === month; }).length;
  var recentTags = [];
  recent.concat(active).forEach(function (r) {
    (r.tags || []).forEach(function (t) { if (recentTags.indexOf(t) < 0) recentTags.push(t); });
  });
  document.getElementById('system-body').innerHTML =
    '<div class="sysrow" data-go="#/list?status=captured"><span>INBOX — AI整理待ち</span><span class="v' + (inbox ? ' warn' : '') + '">' + inbox + '</span></div>' +
    '<div class="sysrow" data-go="#/list"><span>今月の登録</span><span class="v">' + monthly + '</span></div>' +
    '<div class="sysrow" data-go="#/list?status=applied"><span>使用済（実戦投入）</span><span class="v">' + applied + '</span></div>' +
    '<div class="sysrow" style="display:block;"><span style="font-size:11px;color:var(--muted);">TAGS — 最近のタグ</span>' +
    '<div class="terms">' + recentTags.slice(0, 5).map(function (t) { return '<span class="tag" data-tag="' + esc(t) + '">' + esc(t) + '</span>'; }).join('') + '</div></div>';
}

/* ---------- view helpers ---------- */
var viewEl = document.getElementById('view');
function openView(html, wire) {
  viewEl.innerHTML = html;
  viewEl.classList.add('open');
  viewEl.scrollTop = 0;
  if (wire) wire(viewEl);
  var back = $('.back', viewEl);
  if (back) back.addEventListener('click', function () { history.length > 1 ? history.back() : (location.hash = '#/'); });
}
function closeView() { viewEl.classList.remove('open'); viewEl.innerHTML = ''; }
function vhead(code, jp) {
  return '<div class="vhead"><span class="back">◄ BACK</span><span>' + code + '</span><span class="jp">' + esc(jp) + '</span></div>';
}

/* ---------- capture view ---------- */
function viewCapture() {
  var catOpts = CATS.map(function (c) { return '<option value="' + esc(c) + '">' + esc(c) + '</option>'; }).join('');
  var typeOpts = Object.keys(TYPES).map(function (k) { return '<option value="' + k + '">' + TYPES[k] + '</option>'; }).join('');
  var tagList = allTags().map(function (t) { return '<option value="' + esc(t) + '">'; }).join('');
  var html = '<div class="vpanel"><span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>' +
    vhead('CAPTURE', '知識を登録 — タイトルだけで保存できます') +
    '<div class="vbody">' +
    '<div class="field"><label>TITLE <em>*必須</em></label><input type="text" id="f-title" placeholder="例: 水面の動きがゴムっぽく見える原因" autocomplete="off"></div>' +
    '<div class="field"><label>ONE LINER — 一言メモ</label><input type="text" id="f-one" placeholder="例: 水っぽさは法線・反射・リップルで出す" autocomplete="off"></div>' +
    '<details class="adv"><summary>詳細を追加（あとからでもOK）</summary>' +
      '<div class="field" style="margin-top:10px;"><label>BODY — 本文メモ</label><textarea id="f-body" placeholder="詰まった原因、解決策、気づきなど"></textarea></div>' +
      '<div class="grid2">' +
        '<div class="field"><label>CATEGORY — 大分類</label><select id="f-cat">' + catOpts + '</select></div>' +
        '<div class="field"><label>SUB — 中分類（自由）</label><input type="text" id="f-sub" placeholder="例: 水表現" autocomplete="off"></div>' +
      '</div>' +
      '<div class="field"><label>TAGS — カンマ区切り</label><input type="text" id="f-tags" list="taglist" placeholder="例: WPO, Normal, Water" autocomplete="off"><datalist id="taglist">' + tagList + '</datalist></div>' +
      '<div class="grid2">' +
        '<div class="field"><label>TYPE — 知識タイプ</label><select id="f-type">' + typeOpts + '</select></div>' +
        '<div class="field"><label>IMPORTANCE — 重要度</label><select id="f-imp"><option value="1">◆◇◇</option><option value="2">◆◆◇</option><option value="3">◆◆◆</option></select></div>' +
      '</div>' +
      '<div class="field"><label>LINK — 参考リンク</label><input type="url" id="f-link" placeholder="https://" autocomplete="off"></div>' +
    '</details>' +
    '<div class="btnrow"><button class="btn primary" id="f-save">保存 ▸ REGISTER</button><button class="btn" id="f-save-ai">保存してAI整理 ▸</button></div>' +
    '<div class="hint">保存後も続けて登録できます。画像添付はPhase 3で実装予定。</div>' +
    '</div></div>';
  return function () {
    openView(html, function (v) {
      var lastCat = localStorage.getItem('kx-last-cat');
      if (lastCat) $('#f-cat', v).value = lastCat;
      $('#f-title', v).focus();
      function doSave(goAI) {
        var title = $('#f-title', v).value.trim();
        if (!title) { showToast('タイトルを入力してください'); $('#f-title', v).focus(); return; }
        var cat = $('#f-cat', v).value;
        var sub = $('#f-sub', v).value.trim();
        var link = $('#f-link', v).value.trim();
        var rec = newRecord({
          title: title,
          oneLiner: $('#f-one', v).value.trim(),
          body: $('#f-body', v).value.trim(),
          category: sub ? cat + '/' + sub : cat,
          tags: $('#f-tags', v).value.split(/[,、]/).map(function (t) { return t.trim(); }).filter(Boolean),
          type: $('#f-type', v).value,
          importance: parseInt($('#f-imp', v).value, 10),
          links: link ? [link] : []
        });
        localStorage.setItem('kx-last-cat', cat);
        saveRecord(rec).then(function () {
          renderHome();
          if (goAI) { location.hash = '#/ai/' + rec.id; return; }
          showToast('REGISTERED ▸ ' + rec.id + ' 「' + rec.title.slice(0, 14) + '」');
          $('#f-title', v).value = ''; $('#f-one', v).value = ''; $('#f-body', v).value = '';
          $('#f-tags', v).value = ''; $('#f-link', v).value = ''; $('#f-sub', v).value = '';
          $('#f-title', v).focus();
        });
      }
      $('#f-save', v).addEventListener('click', function () { doSave(false); });
      $('#f-save-ai', v).addEventListener('click', function () { doSave(true); });
    });
  };
}

/* ---------- list view ---------- */
function parseQuery(hash) {
  var i = hash.indexOf('?');
  return new URLSearchParams(i >= 0 ? hash.slice(i + 1) : '');
}
function viewList(q) {
  var catOpts = '<option value="">全カテゴリ</option>' + CATS.map(function (c) { return '<option value="' + esc(c) + '">' + esc(c) + '</option>'; }).join('');
  var stOpts = '<option value="">全状態</option>' + Object.keys(STATUS).map(function (k) { return '<option value="' + k + '">' + STATUS[k] + '</option>'; }).join('');
  var html = '<div class="vpanel"><span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>' +
    vhead('RECORDS', '知識データベース一覧') +
    '<div class="vbody">' +
    '<div class="field"><input type="search" id="l-q" placeholder="検索…（タイトル / 一言 / 本文 / タグ）" enterkeyhint="search"></div>' +
    '<div class="filters">' +
      '<select id="l-cat">' + catOpts + '</select>' +
      '<select id="l-status">' + stOpts + '</select>' +
      '<button class="btn fav-toggle" id="l-fav">★ お気に入り</button>' +
    '</div>' +
    '<div class="qresult" id="l-count"></div>' +
    '<div class="listgrid" id="l-grid"></div>' +
    '</div></div>';
  return function () {
    openView(html, function (v) {
      var qEl = $('#l-q', v), catEl = $('#l-cat', v), stEl = $('#l-status', v), favEl = $('#l-fav', v);
      qEl.value = q.get('q') || '';
      catEl.value = q.get('cat') || '';
      stEl.value = q.get('status') || '';
      var fav = q.get('fav') === '1';
      favEl.classList.toggle('on', fav);

      function apply() {
        var query = qEl.value.trim().toLowerCase();
        var cat = catEl.value, st = stEl.value;
        var list = state.records.filter(function (r) {
          if (st ? r.status !== st : r.status === 'archived') return false;
          if (cat && (r.category || '').split('/')[0] !== cat) return false;
          if (fav && !r.favorite) return false;
          if (query) {
            var hay = (r.title + ' ' + (r.oneLiner || '') + ' ' + (r.body || '') + ' ' + (r.tags || []).join(' ') + ' ' + (r.category || '')).toLowerCase();
            if (hay.indexOf(query) < 0) return false;
          }
          return true;
        }).sort(function (a, b) { return (b.updatedAt || '').localeCompare(a.updatedAt || ''); });
        $('#l-count', v).innerHTML = 'QUERY RESULT: <span>' + list.length + '</span> RECORDS';
        $('#l-grid', v).innerHTML = list.length ? list.map(cardHTML).join('') :
          '<div class="empty" style="grid-column:1/-1;"><div class="big">NO MATCH</div>条件に一致する知識がありません</div>';
        var p = new URLSearchParams();
        if (qEl.value.trim()) p.set('q', qEl.value.trim());
        if (cat) p.set('cat', cat);
        if (st) p.set('status', st);
        if (fav) p.set('fav', '1');
        var s = p.toString();
        history.replaceState(null, '', '#/list' + (s ? '?' + s : ''));
      }
      qEl.addEventListener('input', apply);
      catEl.addEventListener('change', apply);
      stEl.addEventListener('change', apply);
      favEl.addEventListener('click', function () { fav = !fav; favEl.classList.toggle('on', fav); apply(); });
      bindCards($('#l-grid', v));
      apply();
    });
  };
}

/* ---------- detail view ---------- */
function viewDetail(id) {
  return function () {
    var r = byId(id);
    if (!r) { showToast('RECORD NOT FOUND: ' + id); location.hash = '#/list'; return; }
    var imp = '◆◆◆'.slice(0, r.importance) + '◇◇◇'.slice(0, 3 - r.importance);
    var aiHtml;
    if (r.ai && r.ai.summary) {
      aiHtml =
        '<div class="sec"><div class="shead">AI SUMMARY — 要約</div><div class="sbody">' + esc(r.ai.summary) + '</div></div>' +
        (r.ai.keyPoints && r.ai.keyPoints.length ? '<div class="sec"><div class="shead">KEY POINTS — 重要ポイント</div><div class="sbody"><ul>' + r.ai.keyPoints.map(function (k) { return '<li>' + esc(k) + '</li>'; }).join('') + '</ul></div></div>' : '') +
        (r.ai.terms && r.ai.terms.length ? '<div class="sec"><div class="shead">TERMS — 技術語</div><div class="sbody">' + r.ai.terms.map(function (t) { return '<div class="term"><b>' + esc(t.term) + '</b> — ' + esc(t.desc) + '</div>'; }).join('') + '</div></div>' : '') +
        (r.ai.useCases && r.ai.useCases.length ? '<div class="sec"><div class="shead">USE CASES — 使える場面</div><div class="sbody"><ul>' + r.ai.useCases.map(function (k) { return '<li>' + esc(k) + '</li>'; }).join('') + '</ul></div></div>' : '') +
        (r.ai.nextKeywords && r.ai.nextKeywords.length ? '<div class="sec"><div class="shead">NEXT — 次に調べる</div><div class="sbody">' + r.ai.nextKeywords.map(function (k) { return '<span class="tag" style="margin-right:6px;">' + esc(k) + '</span>'; }).join('') + '</div></div>' : '') +
        (r.ai.nextExperiments && r.ai.nextExperiments.length ? '<div class="sec"><div class="shead">EXPERIMENTS — 次に試す検証</div><div class="sbody"><ul>' + r.ai.nextExperiments.map(function (k) { return '<li>' + esc(k) + '</li>'; }).join('') + '</ul></div></div>' : '');
    } else {

          r.status = (r.usedIn && r.usedIn.length) ? 'applied' : (r.ai && r.ai.summary) ? 'enriched' : 'captured';
        } else {
          r.status = 'archived';
        }
        saveRecord(r).then(function () {

          showToast(r.status === 'archived' ? 'ARCHIVED ▸ ' + r.id : 'RESTORED ▸ ' + r.id);

          viewDetail(r.id)();

/* ---------- AI analysis (Phase 2: copy & paste flow) ---------- */
function buildPrompt(r) {
  var lines = [];
  lines.push('あなたは制作知識を整理するアシスタントです。以下の知識メモを分析し、指定のJSON形式「だけ」を出力してください。前後の説明文やコードフェンスは不要です。');
  lines.push('');
  lines.push('【知識メモ】');
  lines.push('タイトル: ' + r.title);
  if (r.oneLiner) lines.push('一言メモ: ' + r.oneLiner);
  if (r.body) lines.push('本文: ' + r.body);
  lines.push('カテゴリ: ' + (r.category || '未分類'));
  lines.push('タグ: ' + ((r.tags || []).join(', ') || 'なし'));
  lines.push('');
  var tags = allTags();
  if (tags.length) {
    lines.push('【既存タグ一覧（suggestedTagsはなるべくここから選ぶ。適切なものが無ければ新規でも可）】');
    lines.push(tags.join(', '));
    lines.push('');
  }
  lines.push('【カテゴリ大分類（suggestedCategoryは「大分類/中分類」の形式で）】');
  lines.push(CATS.join(' / '));
  lines.push('');
  lines.push('【出力形式（このJSONのみを出力）】');
  lines.push(JSON.stringify({
    summary: '2〜3文の要約',
    keyPoints: ['重要ポイントを3〜5個'],
    terms: [{ term: '技術語', desc: '1文の説明' }],
    useCases: ['この知識が使える場面'],
    nextKeywords: ['次に調べるキーワード'],
    nextExperiments: ['次に試す検証'],
    suggestedTags: ['タグ案を最大5個'],
    suggestedCategory: '大分類/中分類',
    importance: 2
  }, null, 2));
  return lines.join('\n');
}
function parseAIJson(text) {
  var t = String(text || '').trim();
  t = t.replace(/^```[a-zA-Z]*\s*/, '').replace(/```\s*$/, '');
  var a = t.indexOf('{'), b = t.lastIndexOf('}');
  if (a < 0 || b <= a) throw new Error('JSONが見つかりません');
  var o = JSON.parse(t.slice(a, b + 1));
  if (typeof o.summary !== 'string' || !o.summary) throw new Error('summary がありません');
  ['keyPoints', 'useCases', 'nextKeywords', 'nextExperiments', 'suggestedTags'].forEach(function (k) {
    o[k] = Array.isArray(o[k]) ? o[k].map(String) : [];
  });
  o.terms = (Array.isArray(o.terms) ? o.terms : []).map(function (x) {
    return { term: String((x && x.term) || ''), desc: String((x && x.desc) || '') };
  }).filter(function (x) { return x.term; });
  o.suggestedCategory = String(o.suggestedCategory || '');
  o.importance = Math.min(3, Math.max(1, parseInt(o.importance, 10) || 2));
  return o;
}
function viewAI(id) {
  return function () {
    var r = byId(id);
    if (!r) { showToast('RECORD NOT FOUND: ' + id); location.hash = '#/list'; return; }
    var st = { parsed: null, sel: {}, useCat: true, useImp: true };
    var prompt = buildPrompt(r);
    var html = '<div class="vpanel"><span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>' +
      vhead('AI ANALYSIS ' + esc(r.id), 'AI整理 — コピー → AIに貼る → 返答を貼り戻す') +
      '<div class="vbody">' +
      '<div class="sec"><div class="shead">SOURCE — 元メモ</div><div class="sbody" style="font-size:12px;"><b>' + esc(r.title) + '</b>' + (r.oneLiner ? '<br>' + esc(r.oneLiner) : '') + '</div></div>' +
      '<div class="step"><span class="n">1</span>整理プロンプトをコピーして Claude / ChatGPT に貼る</div>' +
      '<div class="btnrow" style="margin-top:0;"><button class="btn primary" id="ai-copy">📋 プロンプトをコピー</button></div>' +
      '<details class="adv"><summary>プロンプトを表示（手動コピー用）</summary><textarea class="copybox" id="ai-prompt" readonly>' + esc(prompt) + '</textarea></details>' +
      '<div class="step"><span class="n">2</span>AIの返答（JSON）を下に貼り付けて取り込む</div>' +
      '<div class="field"><textarea id="ai-paste" placeholder="AIの返答をそのまま貼り付け（JSON以外が混ざっていてもOK）"></textarea></div>' +
      '<div class="btnrow" style="margin-top:0;"><button class="btn primary" id="ai-parse">取り込む ▸ ANALYZE</button></div>' +
      '<div id="ai-result"></div>' +
      '</div></div>';
    openView(html, function (v) {
      $('#ai-copy', v).addEventListener('click', function () {
        function fallback() {
          var d = $('details.adv', v);
          d.open = true;
          var ta = $('#ai-prompt', v);
          ta.focus(); ta.select();
          var ok = false;
          try { ok = document.execCommand('copy'); } catch (e) {}
          showToast(ok ? 'COPIED ▸ AIに貼り付けてください' : '自動コピー不可 — 表示中のプロンプトを手動でコピーしてください');
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(prompt).then(function () {
            showToast('COPIED ▸ AIに貼り付けてください');
          }, fallback);
        } else { fallback(); }
      });
      $('#ai-parse', v).addEventListener('click', function () {
        var parsed;
        try { parsed = parseAIJson($('#ai-paste', v).value); }
        catch (e) { showToast('取り込み失敗: ' + e.message); return; }
        st.parsed = parsed;
        st.sel = {};
        parsed.suggestedTags.forEach(function (t) {
          if ((r.tags || []).indexOf(t) < 0) st.sel[t] = true;
        });
        st.useCat = !!(parsed.suggestedCategory && parsed.suggestedCategory !== r.category);
        st.useImp = parsed.importance !== r.importance;
        renderResult(v);
        $('#ai-result', v).scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
    function renderResult(v) {
      var p = st.parsed;
      function li(x) { return '<li>' + esc(x) + '</li>'; }
      var tagChips = p.suggestedTags.map(function (t) {
        var have = (r.tags || []).indexOf(t) >= 0;
        if (have) return '<span class="pchip have">' + esc(t) + ' ✓済</span>';
        return '<span class="pchip' + (st.sel[t] ? ' on' : '') + '" data-ptag="' + esc(t) + '">+ ' + esc(t) + '</span>';
      }).join('');
      var box = $('#ai-result', v);
      box.innerHTML =
        '<div class="step"><span class="n">3</span>提案を確認して採用 — 点線＝AIの提案、チップはタップで採用/解除</div>' +
        '<div class="sec proposal"><div class="shead">SUMMARY — 要約</div><div class="sbody">' + esc(p.summary) + '</div></div>' +
        (p.keyPoints.length ? '<div class="sec proposal"><div class="shead">KEY POINTS — 重要ポイント</div><div class="sbody"><ul>' + p.keyPoints.map(li).join('') + '</ul></div></div>' : '') +
        (p.terms.length ? '<div class="sec proposal"><div class="shead">TERMS — 技術語</div><div class="sbody">' + p.terms.map(function (t) { return '<div class="term"><b>' + esc(t.term) + '</b> — ' + esc(t.desc) + '</div>'; }).join('') + '</div></div>' : '') +
        (p.useCases.length ? '<div class="sec proposal"><div class="shead">USE CASES — 使える場面</div><div class="sbody"><ul>' + p.useCases.map(li).join('') + '</ul></div></div>' : '') +
        (p.nextKeywords.length ? '<div class="sec proposal"><div class="shead">NEXT — 次に調べる</div><div class="sbody">' + p.nextKeywords.map(function (k) { return '<span class="tag" style="margin-right:6px;">' + esc(k) + '</span>'; }).join('') + '</div></div>' : '') +
        (p.nextExperiments.length ? '<div class="sec proposal"><div class="shead">EXPERIMENTS — 次に試す検証</div><div class="sbody"><ul>' + p.nextExperiments.map(li).join('') + '</ul></div></div>' : '') +
        (p.suggestedTags.length ? '<div class="sec proposal"><div class="shead">TAG PROPOSALS — タグ案</div><div class="sbody">' + tagChips + '</div></div>' : '') +
        '<div class="sec proposal"><div class="shead">META PROPOSALS — 分類・重要度の提案</div><div class="sbody">' +
          (p.suggestedCategory ? '<span class="pchip' + (st.useCat ? ' on' : '') + '" data-pmeta="cat">カテゴリ: ' + esc(p.suggestedCategory) + '</span>' : '') +
          '<span class="pchip' + (st.useImp ? ' on' : '') + '" data-pmeta="imp">重要度: ' + '◆◆◆'.slice(0, p.importance) + '◇◇◇'.slice(0, 3 - p.importance) + '</span>' +
        '</div></div>' +
        '<div class="btnrow"><button class="btn primary" id="ai-adopt">採用して保存 ▸ ' + (r.status === 'captured' ? 'AI整理済へ' : '保存') + '</button></div>';
      box.addEventListener('click', function (e) {
        var tagEl = e.target.closest('[data-ptag]');
        if (tagEl) {
          var t = tagEl.dataset.ptag;
          st.sel[t] = !st.sel[t];
          tagEl.classList.toggle('on', !!st.sel[t]);
          return;
        }
        var metaEl = e.target.closest('[data-pmeta]');
        if (metaEl) {
          if (metaEl.dataset.pmeta === 'cat') { st.useCat = !st.useCat; metaEl.classList.toggle('on', st.useCat); }
          else { st.useImp = !st.useImp; metaEl.classList.toggle('on', st.useImp); }
        }
      });
      $('#ai-adopt', box).addEventListener('click', function () {
        r.ai = {
          summary: p.summary, keyPoints: p.keyPoints, terms: p.terms,
          useCases: p.useCases, nextKeywords: p.nextKeywords, nextExperiments: p.nextExperiments,
          suggestedTags: p.suggestedTags, suggestedCategory: p.suggestedCategory,
          relatedIds: (r.ai && r.ai.relatedIds) || []
        };
        r.tags = r.tags || [];
        Object.keys(st.sel).forEach(function (t) {
          if (st.sel[t] && r.tags.indexOf(t) < 0) r.tags.push(t);
        });
        if (st.useCat && p.suggestedCategory) r.category = p.suggestedCategory;
        if (st.useImp) r.importance = p.importance;
        if (r.status === 'captured') r.status = 'enriched';
        saveRecord(r).then(function () {
          renderHome();
          showToast('ENRICHED ▸ ' + r.id + ' AI整理を保存しました');
          location.hash = '#/detail/' + r.id;
        });
      });
    }
  };
}

        '<button class="btn primary" id="s-export">⬇ エクスポート</button>' +

    '</div></div>';
  return function () {
    openView(html, function (v) {
      $('#s-export', v).addEventListener('click', function () {
        var blob = new Blob([JSON.stringify({ app: 'knowledge-codex', exportedAt: new Date().toISOString(), records: state.records }, null, 2)], { type: 'application/json' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'knowledge-codex-' + today() + '.json';
        a.click();
        URL.revokeObjectURL(a.href);
        showToast('EXPORTED ▸ ' + state.records.length + ' RECORDS');
      });
      $('#s-import', v).addEventListener('click', function () { $('#s-file', v).click(); });
      $('#s-file', v).addEventListener('change', function (e) {
        var f = e.target.files[0];
        if (!f) return;
        var reader = new FileReader();
        reader.onload = function () {
          try {
            var data = JSON.parse(reader.result);
            var recs = Array.isArray(data) ? data : data.records;
            if (!Array.isArray(recs)) throw new Error('records array not found');

            Promise.all(recs.map(function (rec) {
              if (!rec.id || !rec.title) return Promise.resolve();
              var i = state.records.findIndex(function (x) { return x.id === rec.id; });
              if (i >= 0) state.records[i] = rec; else state.records.push(rec);
              return dbPut(rec);
            })).then(function () {
              renderHome();
              showToast('IMPORTED ▸ ' + recs.length + ' RECORDS');
            });
          } catch (err) {
            showToast('読み込み失敗: JSONの形式が不正です');
          }
        };
        reader.readAsText(f);
      });
    });
  };
}

/* ---------- router ---------- */
function route() {
  var h = location.hash || '#/';
  var m;
  if (h === '#/' || h === '' || h === '#') { closeView(); renderHome(); return; }
  if (h.indexOf('#/capture') === 0) { viewCapture()(); return; }
  if (h.indexOf('#/list') === 0) { viewList(parseQuery(h))(); return; }
  if ((m = h.match(/^#\/detail\/([A-Za-z]+-\d+)/))) { viewDetail(m[1])(); return; }
  if ((m = h.match(/^#\/ai\/([A-Za-z]+-\d+)/))) { viewAI(m[1])(); return; }
  if (h.indexOf('#/settings') === 0) { viewSettings()(); return; }
  closeView(); renderHome();
}
addEventListener('hashchange', route);

/* ---------- home wiring ---------- */
document.getElementById('go-home').addEventListener('click', function () { location.hash = '#/'; });
document.getElementById('go-settings').addEventListener('click', function () { location.hash = '#/settings'; });
document.getElementById('btn-capture').addEventListener('click', function () { location.hash = '#/capture'; });
document.getElementById('panel-records').addEventListener('click', function (e) {
  if (!e.target.closest('.kcard')) location.hash = '#/list';
});
bindCards(document.getElementById('recent-body'));
document.getElementById('archive-body').addEventListener('click', function (e) {
  var m = e.target.closest('.meter');
  if (m) { e.stopPropagation(); location.hash = '#/list?cat=' + encodeURIComponent(m.dataset.cat); }
});
document.getElementById('system-body').addEventListener('click', function (e) {
  var tag = e.target.closest('[data-tag]');
  if (tag) { e.stopPropagation(); location.hash = '#/list?q=' + encodeURIComponent(tag.dataset.tag); return; }
  var row = e.target.closest('[data-go]');
  if (row) { e.stopPropagation(); location.hash = row.dataset.go; }
});
var searchbox = document.getElementById('searchbox');
searchbox.addEventListener('keydown', function (e) {
  if (e.key === 'Enter') location.hash = '#/list?q=' + encodeURIComponent(searchbox.value.trim());
});
addEventListener('keydown', function (e) {
  if (e.key === '/' && !viewEl.classList.contains('open') &&
      !/INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)) {
    e.preventDefault();
    searchbox.focus();
  }
});

/* ---------- clock ---------- */
function tick() {
  var d = new Date();
  function z(n) { return (n < 10 ? '0' : '') + n; }
  document.getElementById('clock').textContent = z(d.getHours()) + ':' + z(d.getMinutes()) + ':' + z(d.getSeconds());
}
setInterval(tick, 1000);
tick();

/* ---------- background + parallax ---------- */
var canvas = document.getElementById('bg');
var ctx = canvas.getContext('2d');
var particles = [];
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
addEventListener('resize', resize);
resize();
var COUNT = Math.min(70, Math.floor(innerWidth / 14));
for (var i = 0; i < COUNT; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    z: Math.random() * 0.8 + 0.2,
    r: Math.random() * 1.6 + 0.4,
    vy: -(Math.random() * 0.22 + 0.05),
    a: Math.random() * 0.5 + 0.15
  });
}

var stage = document.getElementById('stage');
var targRx = 0, targRy = 0, curRx = 0, curRy = 0;
var lastInput = 0;

function fitStage() {
  if (matchMedia('(min-width: 761px)').matches) {
    var stageH = parseFloat(getComputedStyle(stage).height) || 620;
    var s = Math.min(1, (innerHeight - 64) / (stageH + 56), (innerWidth - 32) / 1100);
    stage.style.setProperty('--s', Math.max(0.5, s).toFixed(3));
  } else {
    stage.style.setProperty('--s', '1');
  }
}
addEventListener('resize', fitStage);
fitStage();

addEventListener('pointermove', function (e) {
  if (!matchMedia('(hover: hover)').matches) return;
  lastInput = performance.now();
  targRy = ((e.clientX / innerWidth) - 0.5) * 7;
  targRx = ((e.clientY / innerHeight) - 0.5) * -5;
});

function onOrient(e) {
  if (e.gamma == null && e.beta == null) return;
  lastInput = performance.now();
  var g = Math.max(-25, Math.min(25, e.gamma || 0));
  var b = Math.max(-25, Math.min(25, (e.beta || 45) - 45));
  targRy = g / 25 * 5;
  targRx = b / 25 * -3;
}
if (!matchMedia('(hover: hover)').matches) {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    var askGyro = function () {
      DeviceOrientationEvent.requestPermission().then(function (r) {
        if (r === 'granted') addEventListener('deviceorientation', onOrient);
      }).catch(function () {});
      removeEventListener('touchend', askGyro);
    };
    addEventListener('touchend', askGyro);
  } else {
    addEventListener('deviceorientation', onOrient);
  }
}

function draw(t) {
  t = t || 0;
  if (t - lastInput > 4000) {
    targRy = Math.sin(t * 0.00035) * 2.2;
    targRx = Math.cos(t * 0.00027) * 1.4;
  }
  curRx += (targRx - curRx) * 0.055;
  curRy += (targRy - curRy) * 0.055;
  stage.style.setProperty('--rx', curRx.toFixed(3) + 'deg');
  stage.style.setProperty('--ry', curRy.toFixed(3) + 'deg');

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  var g = ctx.createRadialGradient(canvas.width / 2, canvas.height * 0.42, 40, canvas.width / 2, canvas.height * 0.42, canvas.width * 0.7);
  g.addColorStop(0, 'rgba(20,60,90,0.28)');
  g.addColorStop(1, 'rgba(4,7,13,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  var parX = curRy / 7, parY = curRx / 5;
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    p.y += p.vy;
    if (p.y < -4) { p.y = canvas.height + 4; p.x = Math.random() * canvas.width; }
    ctx.beginPath();
    ctx.arc(p.x + parX * 46 * p.z, p.y - parY * 30 * p.z, p.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(127,232,255,' + p.a + ')';
    ctx.fill();
  }
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

/* ---------- boot ---------- */
openDB().then(function (d) {
  db = d;
  return dbAll();
}).then(function (recs) {
  if (recs.length === 0) {
    var seeds = seedRecords();
    state.records = seeds;
    return Promise.all(seeds.map(dbPut)).then(function () { return seeds; });
  }
  state.records = recs;
}).then(function () {
  renderHome();
  route();
}).catch(function (err) {
  showToast('DB初期化エラー: ' + err);
});
</script>
