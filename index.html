<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#030711">
<title>Knowledge Codex</title>
<style>
  :root {
    --bg: #020409;
    --panel: rgba(10, 20, 48, 0.62);
    --panel-solid: rgba(8, 16, 42, 0.96);
    --line: #1c3566;
    --line-bright: #3a76ff;
    --cyan: #7aa8ff;
    --cyan-dim: #5585e8;
    --text: #dbe7ff;
    --muted: #52689c;
    --amber: #ffd98a;
    --green: #9fe6b8;
    --mono: Consolas, "Courier New", monospace;
    --frame: #7aacff;
    --frame-dim: rgba(64,124,255,0.55);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
  }

  #bg { position: fixed; inset: 0; z-index: 0; }
  /* 回路基板パターン（lookdev-1で承認された新ルックの下地。粒子キャンバスの背後） */
  #circuit { position: fixed; inset: 0; z-index: 0; opacity: 0.9; }
  #circuit svg { width: 100%; height: 100%; display: block; }
  #circuit .tr { stroke: var(--line-bright); fill: none; stroke-linecap: square; }
  #circuit .trhi { stroke: var(--cyan); fill: none; stroke-linecap: square; filter: drop-shadow(0 0 2.5px rgba(122,168,255,0.9)); }
  #circuit .pado { stroke: var(--line-bright); fill: none; }
  #circuit .padf { fill: var(--line-bright); stroke: none; }

  .hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 30;
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    padding: 12px 18px 10px;
    font-family: var(--mono); font-size: 12px; letter-spacing: 1px;
    color: var(--cyan-dim);
    background: linear-gradient(180deg, rgba(3,7,17,0.9), transparent);
    pointer-events: none;
  }
  .hud::after {
    content: ""; position: absolute; left: 18px; right: 18px; bottom: 0; height: 1px;
    background: linear-gradient(90deg, var(--line-bright), rgba(58,110,255,0.06) 60%, transparent);
  }
  .hud .brand { color: var(--cyan); font-size: 14px; letter-spacing: 3px; cursor: pointer; pointer-events: auto; }
  .hud .right { display: flex; align-items: center; gap: 12px; pointer-events: auto; }
  .hud .stats { text-align: right; }
  .hud .stats span { color: var(--cyan); }
  .hud .gear {
    cursor: pointer; color: var(--cyan-dim); border: 1px solid var(--line);
    border-radius: 0; padding: 3px 8px; font-size: 12px; background: rgba(6,13,34,0.6);
  }
  .hud .gear:hover { color: var(--cyan); border-color: var(--line-bright); }

  .scene {
    position: fixed; inset: 0; z-index: 10;
    perspective: 1400px; perspective-origin: 50% 42%;
    display: flex; align-items: center; justify-content: center;
  }
  .stage {
    position: relative;
    width: min(1080px, 96vw); height: 620px;
    transform-style: preserve-3d;
    transform: rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)) scale(var(--s, 1));
  }

  .floor {
    position: absolute; left: 50%; top: 66%;
    width: 1800px; height: 1100px;
    transform: translate(-50%, -18%) rotateX(76deg) translateZ(-120px);
    background:
      repeating-linear-gradient(0deg, rgba(58,110,255,0.16) 0 1px, transparent 1px 60px),
      repeating-linear-gradient(90deg, rgba(58,110,255,0.16) 0 1px, transparent 1px 60px);
    -webkit-mask-image: radial-gradient(ellipse 50% 44% at 50% 34%, #000 35%, transparent 78%);
    mask-image: radial-gradient(ellipse 50% 44% at 50% 34%, #000 35%, transparent 78%);
    pointer-events: none;
  }

  /* 角欠きフレーム（lookdev-1承認・v26展開）: 要素=枠色+クリップ、::after=内側の地+走査線 */
  .panel {
    position: absolute;
    --cutL: 18px; --cut: 8px;
    clip-path: polygon(
      var(--cutL) 0, calc(100% - var(--cut)) 0, 100% var(--cut),
      100% calc(100% - var(--cutL)), calc(100% - var(--cutL)) 100%,
      var(--cut) 100%, 0 calc(100% - var(--cut)), 0 var(--cutL)
    );
    background: linear-gradient(180deg, var(--frame) 0%, var(--frame-dim) 45%, var(--frame) 100%);
    filter: drop-shadow(0 0 14px rgba(58,110,255,0.42));
    cursor: pointer;
  }
  .panel::after {
    content: ""; position: absolute; inset: 1px; z-index: 0; pointer-events: none;
    outline: 1px solid rgba(122,160,255,0.09); outline-offset: -7px;
    clip-path: polygon(
      var(--cutL) 0, calc(100% - var(--cut)) 0, 100% var(--cut),
      100% calc(100% - var(--cutL)), calc(100% - var(--cutL)) 100%,
      var(--cut) 100%, 0 calc(100% - var(--cut)), 0 var(--cutL)
    );
    background:
      repeating-linear-gradient(0deg, rgba(122,160,255,0.028) 0 1px, transparent 1px 3px),
      linear-gradient(168deg, rgba(10,19,42,0.97), rgba(4,8,20,0.985));
  }
  .panel > * { position: relative; z-index: 1; }
  .panel:hover, .panel:active { filter: drop-shadow(0 0 26px rgba(122,160,255,0.7)); }

  .p-head {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 2px; color: var(--cyan);
    padding: 10px 12px 8px 24px; /* 左は角欠き（--cutL）と干渉しない余白 */
    border-bottom: 1px solid rgba(58,110,255,0.35);
    background: linear-gradient(90deg, rgba(58,110,255,0.14), transparent 70%);
  }
  .p-head .dot { width: 6px; height: 6px; background: var(--cyan); box-shadow: 0 0 6px var(--cyan); border-radius: 1px; }
  .p-head .jp { margin-left: auto; color: var(--muted); letter-spacing: 0; font-family: "Segoe UI", system-ui, sans-serif; font-size: 11px; }
  .p-body { padding: 12px; }

  .float { animation: panelIn 0.55s ease-out both, bob 7s ease-in-out infinite alternate; }
  .float.d1 { animation-delay: 0.18s, -2.2s; }
  .float.d2 { animation-delay: 0.36s, -4.4s; }
  @keyframes bob { from { transform: translateY(-4px); } to { transform: translateY(5px); } }
  @keyframes panelIn { from { opacity: 0; } to { opacity: 1; } }
  #console { animation: panelIn 0.55s ease-out 0.5s both; }
  .capture { animation: glowPulse 3.2s ease-in-out infinite; }
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 12px rgba(122,160,255,0.35); }
    50% { box-shadow: 0 0 24px rgba(122,160,255,0.65); }
  }

  #panel-archive { left: 0; top: 70px; width: 290px; transform: rotateY(26deg) translateZ(-30px); }
  #panel-records { left: 50%; top: 26px; width: 450px; margin-left: -225px; transform: translateZ(70px); }
  #panel-system { right: 0; top: 70px; width: 290px; transform: rotateY(-26deg) translateZ(-30px); }
  #console { left: 50%; bottom: 10px; width: 640px; margin-left: -320px; transform: translateZ(150px) rotateX(24deg); cursor: default; }

  .meter { margin-bottom: 10px; cursor: pointer; }
  .meter:hover .lbl span:first-child { color: var(--cyan); }
  .meter .lbl { display: flex; justify-content: space-between; font-size: 12px; color: var(--text); margin-bottom: 4px; }
  .meter .lbl span:last-child { font-family: var(--mono); color: var(--cyan); }
  .meter .bar { height: 4px; background: rgba(58,110,255,0.14); overflow: hidden; }
  .meter .bar i { display: block; height: 100%; background: linear-gradient(90deg, var(--line-bright), var(--cyan)); box-shadow: 0 0 6px rgba(122,160,255,0.6); }

  .kcard {
    display: flex; gap: 10px; align-items: stretch;
    background: rgba(12, 24, 54, 0.75);
    border: 1px solid rgba(58,110,255,0.4);
    border-radius: 0;
    padding: 9px 10px;
    margin-bottom: 9px;
    position: relative;
    cursor: pointer;
  }
  .kcard:hover { border-color: var(--cyan); background: rgba(15, 32, 70, 0.85); }
  .kcard .thumb {
    flex: 0 0 52px; height: 52px; align-self: center;
    border: 1px solid rgba(58,110,255,0.5); border-radius: 0;
    background:
      linear-gradient(135deg, transparent 42%, rgba(58,110,255,0.35) 43%, transparent 44%),
      linear-gradient(135deg, transparent 56%, rgba(58,110,255,0.25) 57%, transparent 58%),
      rgba(6, 13, 34, 0.8);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 10px; color: var(--muted);
  }
  .kcard .info { min-width: 0; flex: 1; }
  .kcard .row1 { display: flex; align-items: center; gap: 8px; }
  .kcard .kid { font-family: var(--mono); font-size: 11px; color: var(--cyan-dim); }
  .kcard .star { margin-left: auto; font-size: 14px; color: var(--muted); padding: 0 2px; }
  .kcard .star.on { color: var(--cyan); text-shadow: 0 0 6px rgba(122,160,255,0.8); }
  .kcard .title { font-size: 13px; font-weight: 600; color: var(--text); margin: 2px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kcard .one { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kcard .row2 { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
  .imp { font-family: var(--mono); font-size: 10px; color: var(--cyan-dim); letter-spacing: 1px; }
  .tag { font-size: 10px; color: var(--cyan-dim); border: 1px solid rgba(58,110,255,0.45); border-radius: 0; padding: 1px 6px; }
  .chip { font-size: 10px; border-radius: 0; padding: 1px 7px; margin-left: auto; white-space: nowrap; }
  .chip.enriched { color: var(--cyan); background: rgba(58,110,255,0.16); border: 1px solid rgba(58,110,255,0.5); }
  .chip.captured { color: var(--amber); background: rgba(255,217,138,0.1); border: 1px solid rgba(255,217,138,0.4); }
  .chip.applied { color: var(--green); background: rgba(159,230,184,0.1); border: 1px solid rgba(159,230,184,0.4); }
  .chip.archived { color: var(--muted); background: rgba(77,125,156,0.1); border: 1px solid rgba(77,125,156,0.4); }

  .sysrow { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px dashed rgba(58,110,255,0.2); font-size: 12px; cursor: pointer; }
  .sysrow:hover span:first-child { color: var(--cyan); }
  .sysrow:last-child { border-bottom: none; cursor: default; }
  .sysrow .v { font-family: var(--mono); color: var(--cyan); font-size: 16px; }
  .sysrow .v.warn { color: var(--amber); }
  .terms { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .terms .tag { cursor: pointer; }
  .terms .tag:hover { color: var(--cyan); border-color: var(--cyan); }

  .console-inner { display: flex; gap: 10px; padding: 12px; align-items: center; }
  .search {
    flex: 1; display: flex; align-items: center; gap: 8px;
    background: rgba(6, 13, 34, 0.8);
    border: 1px solid var(--line); border-radius: 0;
    padding: 9px 12px;
  }
  .search input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-size: 13px; font-family: inherit; min-width: 0;
  }
  .search input::placeholder { color: var(--muted); }
  .search .key { font-family: var(--mono); font-size: 10px; color: var(--muted); border: 1px solid var(--line); border-radius: 0; padding: 1px 5px; }
  .capture {
    font-family: var(--mono); font-size: 13px; letter-spacing: 1px;
    color: #041028; background: linear-gradient(180deg, var(--cyan), var(--cyan-dim));
    border: none; border-radius: 0; padding: 10px 18px; cursor: pointer;
    box-shadow: 0 0 16px rgba(122,160,255,0.45);
    font-weight: 700;
  }
  .capture:active { transform: scale(0.97); }

  #view {
    position: fixed; inset: 0; z-index: 25; display: none;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    background: rgba(3, 7, 17, 0.6);
    padding: 62px 14px 28px;
  }
  #view.open { display: block; }
  .vpanel {
    position: relative; max-width: 880px; margin: 0 auto;
    --cutL: 25px; --cut: 11px;
    clip-path: polygon(
      var(--cutL) 0, calc(100% - var(--cut)) 0, 100% var(--cut),
      100% calc(100% - var(--cutL)), calc(100% - var(--cutL)) 100%,
      var(--cut) 100%, 0 calc(100% - var(--cut)), 0 var(--cutL)
    );
    background: linear-gradient(180deg, var(--frame) 0%, var(--frame-dim) 45%, var(--frame) 100%);
    filter: drop-shadow(0 0 16px rgba(58,110,255,0.46));
    animation: viewIn 0.22s ease-out;
  }
  .vpanel::after {
    content: ""; position: absolute; inset: 1px; z-index: 0; pointer-events: none;
    outline: 1px solid rgba(122,160,255,0.09); outline-offset: -7px;
    clip-path: polygon(
      var(--cutL) 0, calc(100% - var(--cut)) 0, 100% var(--cut),
      100% calc(100% - var(--cutL)), calc(100% - var(--cutL)) 100%,
      var(--cut) 100%, 0 calc(100% - var(--cut)), 0 var(--cutL)
    );
    background:
      repeating-linear-gradient(0deg, rgba(122,160,255,0.02) 0 1px, transparent 1px 3px),
      linear-gradient(168deg, rgba(9,17,38,0.975), rgba(4,8,19,0.99));
  }
  .vpanel > * { position: relative; z-index: 1; }
  @keyframes viewIn { from { opacity: 0; transform: scale(0.965) translateY(8px); } to { opacity: 1; transform: none; } }
  .vhead {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 12px; letter-spacing: 2px; color: var(--cyan);
    padding: 12px 14px 12px 32px; /* 左は角欠き（--cutL:25px）と干渉しない余白 */
    border-bottom: 1px solid rgba(58,110,255,0.35);
    background: linear-gradient(90deg, rgba(58,110,255,0.14), transparent 70%);
  }
  .hud-back {
    display: none; pointer-events: auto;
    font-family: var(--mono); font-size: 12px; letter-spacing: 1px;
    color: var(--cyan); background: rgba(6,13,34,0.9);
    border: 1px solid var(--line-bright); border-radius: 0;
    padding: 5px 11px; cursor: pointer;
    box-shadow: 0 0 8px rgba(58,110,255,0.3);
  }
  .hud-back:hover { background: rgba(58,110,255,0.18); color: #dbe7ff; }
  .hud-back:active { transform: scale(0.96); }
  body.view-open .hud .stats, body.view-open .hud .gear { display: none; }
  body.view-open .hud-back { display: inline-block; }
  .vhead .jp { margin-left: auto; color: var(--muted); letter-spacing: 0; font-family: "Segoe UI", system-ui, sans-serif; font-size: 11px; }
  .vbody { padding: 16px 16px 20px; }

  .field { margin-bottom: 13px; }
  .field label { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; color: var(--cyan-dim); margin-bottom: 5px; }
  .field label em { font-style: normal; color: var(--amber); }
  input[type="text"], input[type="search"], input[type="url"], textarea, select {
    width: 100%; background: rgba(6, 13, 34, 0.85);
    border: 1px solid var(--line); border-radius: 0;
    color: var(--text); padding: 9px 12px; font-size: 14px; font-family: inherit;
    outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--cyan); box-shadow: 0 0 8px rgba(122,160,255,0.25); }
  textarea { resize: vertical; min-height: 90px; }
  select { -webkit-appearance: none; appearance: none; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btnrow { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
  .btn {
    font-family: var(--mono); font-size: 12px; letter-spacing: 1px;
    color: var(--cyan); background: rgba(58,110,255,0.08);
    border: 1px solid var(--line-bright); border-radius: 0;
    padding: 9px 16px; cursor: pointer;
  }
  .btn:hover { background: rgba(58,110,255,0.18); }
  .btn:active { transform: scale(0.97); }
  .btn.primary {
    color: #041028; background: linear-gradient(180deg, var(--cyan), var(--cyan-dim)); border: none; font-weight: 700;
    clip-path: polygon(8px 0, calc(100% - 8px) 0, 100% 50%, calc(100% - 8px) 100%, 8px 100%, 0 50%);
    padding-left: 22px; padding-right: 22px;
    filter: drop-shadow(0 0 12px rgba(122,160,255,0.7));
  }
  .btn.danger { color: #ff9a9a; border-color: rgba(255,120,120,0.5); background: rgba(255,120,120,0.06); }
  details.adv { margin-top: 4px; }
  details.adv summary { cursor: pointer; font-family: var(--mono); font-size: 11px; letter-spacing: 1px; color: var(--cyan-dim); padding: 6px 0; list-style: none; }
  details.adv summary::before { content: "▸ "; }
  details.adv[open] summary::before { content: "▾ "; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
  .filters select { width: auto; padding: 6px 26px 6px 10px; font-size: 12px; background-image: linear-gradient(45deg, transparent 50%, var(--cyan-dim) 50%), linear-gradient(135deg, var(--cyan-dim) 50%, transparent 50%); background-position: calc(100% - 14px) 55%, calc(100% - 10px) 55%; background-size: 4px 4px; background-repeat: no-repeat; }
  .filters .fav-toggle { font-size: 13px; padding: 6px 12px; }
  .filters .fav-toggle.on { color: var(--cyan); background: rgba(58,110,255,0.2); }
  .qresult { font-family: var(--mono); font-size: 11px; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }
  .qresult span { color: var(--cyan); }
  .listgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 10px; }
  .listgrid .kcard { margin-bottom: 0; }
  .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 34px 0; }
  .empty .big { font-family: var(--mono); color: var(--cyan-dim); font-size: 15px; letter-spacing: 2px; margin-bottom: 8px; }

  .dhead { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .dhead .kid { font-family: var(--mono); font-size: 13px; color: var(--cyan-dim); }
  .dhead .star { cursor: pointer; font-size: 18px; color: var(--muted); }
  .dhead .star.on { color: var(--cyan); text-shadow: 0 0 8px rgba(122,160,255,0.8); }
  .dtitle { font-size: 19px; font-weight: 700; color: var(--text); margin: 4px 0 2px; }
  .done { font-size: 13px; color: var(--cyan-dim); margin-bottom: 10px; }
  .dmeta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .dmeta .cat { font-size: 11px; color: var(--text); background: rgba(58,110,255,0.12); border: 1px solid rgba(58,110,255,0.4); border-radius: 0; padding: 2px 8px; }
  .dmeta .date { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-left: auto; }
  .sec { border: 1px solid rgba(58,110,255,0.25); border-radius: 0; margin-bottom: 12px; overflow: hidden; }
  .sec .shead { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--cyan-dim); padding: 7px 12px; background: rgba(58,110,255,0.07); border-bottom: 1px solid rgba(58,110,255,0.2); }
  .sec .sbody { padding: 12px; font-size: 13px; line-height: 1.8; color: var(--text); white-space: pre-wrap; word-break: break-word; }
  .sec .sbody.dim { color: var(--muted); font-size: 12px; }
  .sec ul { margin: 0 0 0 18px; }
  .sec .term { margin-bottom: 6px; }
  .sec .term b { color: var(--cyan); font-weight: 600; }
  .loglist .log { border-bottom: 1px dashed rgba(58,110,255,0.2); padding: 6px 0; font-size: 12px; }
  .loglist .log:last-child { border-bottom: none; }
  .loglist .log .d { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-right: 8px; }

  .sec.proposal { border-style: dashed; border-color: rgba(255,217,138,0.45); }
  .sec.proposal .shead { color: var(--amber); background: rgba(255,217,138,0.06); border-bottom-color: rgba(255,217,138,0.25); }
  .pchip {
    display: inline-block; font-size: 12px; color: var(--amber);
    border: 1px dashed rgba(255,217,138,0.55); border-radius: 0;
    padding: 3px 10px; margin: 0 6px 6px 0; cursor: pointer; user-select: none;
  }
  .pchip.on { color: var(--cyan); border: 1px solid var(--line-bright); background: rgba(58,110,255,0.14); }
  .pchip.have { color: var(--muted); border: 1px solid var(--line); cursor: default; }
  .step {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px; color: var(--cyan);
    margin: 16px 0 8px;
  }
  .step .n {
    width: 20px; height: 20px; flex: 0 0 20px; border: 1px solid var(--line-bright); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 11px;
    box-shadow: 0 0 8px rgba(58,110,255,0.3);
  }
  .copybox { font-family: var(--mono); font-size: 11px; min-height: 140px; margin-top: 8px; }
  .applyform { display: none; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .applyform.show { display: flex; }
  .applyform input { flex: 1; min-width: 140px; }

  .kcard .thumb.has-img { background-size: cover; background-position: center; color: transparent; }

  .ltable { width: 100%; border-collapse: collapse; font-size: 12px; }
  .ltable th {
    font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; color: var(--cyan-dim);

  .attgrid { display: flex; flex-wrap: wrap; gap: 8px; }

  }
  .attgrid .att img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .attgrid .att .rm {

    font-size: 11px; line-height: 16px; text-align: center; cursor: pointer;
  }
  input[type="file"] { color: var(--muted); font-size: 12px; }

  .lightbox {

  /* カードも基盤ルック: パネルと同じ角欠き二重構造（v28） */
  .ccard {
    position: relative; width: 100%; aspect-ratio: 63/88;
    display: flex; flex-direction: column;
    --cutL: 11px; --cut: 5px;
    clip-path: polygon(
      var(--cutL) 0, calc(100% - var(--cut)) 0, 100% var(--cut),
      100% calc(100% - var(--cutL)), calc(100% - var(--cutL)) 100%,
      var(--cut) 100%, 0 calc(100% - var(--cut)), 0 var(--cutL)
    );
    background: linear-gradient(180deg, var(--frame) 0%, var(--frame-dim) 45%, var(--frame) 100%);
    filter: drop-shadow(0 0 12px rgba(58,110,255,0.4));
    overflow: hidden; /* 必須: これが無いとaspect-ratioが中身の最小サイズに負けて縦に伸びる */
  }
  .ccard::after {
    content: ""; position: absolute; inset: 1px; z-index: 0; pointer-events: none;
    clip-path: polygon(
      var(--cutL) 0, calc(100% - var(--cut)) 0, 100% var(--cut),
      100% calc(100% - var(--cutL)), calc(100% - var(--cutL)) 100%,
      var(--cut) 100%, 0 calc(100% - var(--cut)), 0 var(--cutL)
    );
    background:
      repeating-linear-gradient(0deg, rgba(122,160,255,0.03) 0 1px, transparent 1px 3px),
      linear-gradient(165deg, rgba(12,26,60,0.97), rgba(5,10,30,0.985));
  }
  .ccard > * { position: relative; z-index: 1; }
  .ccard .chead {
    display: flex; align-items: center; padding: 8px 10px 6px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--cyan-dim);
    border-bottom: 1px solid rgba(58,110,255,0.3);
  }
  .ccard .chead .chip { font-size: 9px; padding: 1px 6px; }
  .ccard .cimg {
    margin: 8px 10px 0; aspect-ratio: 16/10; flex: none;
    border: 1px solid rgba(58,110,255,0.45); border-radius: 0; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(circle at 50% 40%, rgba(58,110,255,0.18), transparent 70%),
      repeating-linear-gradient(0deg, rgba(58,110,255,0.06) 0 1px, transparent 1px 12px),
      repeating-linear-gradient(90deg, rgba(58,110,255,0.06) 0 1px, transparent 1px 12px),
      rgba(4,9,26,0.9);
  }
  .ccard .cimg img { width: 100%; height: 100%; object-fit: cover; }
  .ccard .cimg .glyph { font-family: var(--mono); font-size: 24px; letter-spacing: 3px; color: var(--cyan); text-shadow: 0 0 14px rgba(122,160,255,0.7); }
  .ccard .cbody { padding: 8px 10px 2px; flex: 1; min-height: 0; overflow: hidden; }
  .ccard .ctitle { font-size: 12.5px; font-weight: 700; color: var(--text); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .ccard .cone { font-size: 10px; color: var(--muted); margin-top: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .ccard .cstats { padding: 0 10px 6px; font-family: var(--mono); font-size: 9px; letter-spacing: 1px; color: var(--cyan-dim); }
  .ccard .cstats > div { display: flex; justify-content: space-between; padding: 2px 0; }
  .ccard .cstats span:last-child { color: var(--cyan); letter-spacing: 2px; }
  .ccard .cfoot {
    border-top: 1px dashed rgba(58,110,255,0.3); padding: 6px 10px;
    font-family: var(--mono); font-size: 8.5px; letter-spacing: 1px; color: var(--muted);
    display: flex; justify-content: space-between; gap: 8px;

  .booknav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 10px; }
  .bookpages {
    display: grid; grid-template-columns: 1fr 1fr;
    background: rgba(5,10,30,0.5); border: 1px solid var(--line); border-radius: 0;

  }
  .bookpages.single { grid-template-columns: 1fr; }
  .bpage { padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .bpage + .bpage { border-left: 1px solid rgba(58,110,255,0.35); }
  .bslot {
    flex: none;
    width: min(160px, calc((100vh - 305px) / 3 * 0.716));
    width: min(160px, calc((100dvh - 305px) / 3 * 0.716));
  }
  /* アルバム行: カード左寄せ+右に概要（縦横共通・v31） */
  .bookwrap { display: flex; align-items: stretch; }
  .bookwrap .bookpages { flex: 1; min-width: 0; }
  .btabs { display: flex; flex-direction: column; gap: 4px; width: 32px; flex: none; padding: 10px 0; }
  .btab {
    flex: 1; writing-mode: vertical-rl; text-orientation: mixed;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--cyan-dim);
    background: rgba(10,20,44,0.55); border: 1px solid rgba(58,110,255,0.3); border-left-color: rgba(58,110,255,0.12);
    padding: 8px 2px; cursor: pointer;
  }
  .btab.off { opacity: 0.3; cursor: default; }
  .btab:not(.off):hover, .btab:not(.off):active { background: rgba(58,110,255,0.2); color: var(--cyan); }
  .brow { display: flex; gap: 12px; width: 100%; align-items: stretch; cursor: pointer; transition: transform 0.15s; }
  .brow[data-id]:hover { transform: translateY(-2px); }
  .bsum { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 5px; padding-right: 2px; }
  .bsum-t { font-size: 12.5px; font-weight: 700; color: var(--text); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .bsum-m { display: flex; align-items: center; gap: 8px; }
  .bsum-m .chip { margin-left: 0; }
  .bsum-cat { font-family: var(--mono); font-size: 9px; letter-spacing: 1px; color: var(--muted); }
  .bsum-s { font-family: var(--mono); font-size: 9.5px; letter-spacing: 1px; color: var(--cyan-dim); }
  .bsum-s b { color: var(--cyan); font-weight: 400; letter-spacing: 2px; }
  .bsum-g { display: flex; flex-wrap: wrap; gap: 4px; }
  .bsum-empty { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: rgba(77,125,156,0.4); align-items: center; }
  /* ブック内カードは単体カード画面と同じ見た目（一言メモだけ非表示。小サイズでは下から自然にクリップ） */
  .bpage .ccard .cone { display: none; }
  .bempty {
    width: 100%; aspect-ratio: 63/88;
    border: 1px dashed rgba(58,110,255,0.25); border-radius: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: rgba(77,125,156,0.55);
  }
  /* ページめくり: 入ってくるページが背(ノド)を軸に起き上がる。反対側は下から現れる */
  .bpage.turnInNext { animation: pageInNext 0.5s cubic-bezier(0.2, 0.7, 0.3, 1); transform-origin: left center; backface-visibility: hidden; }
  .bpage.turnInPrev { animation: pageInPrev 0.5s cubic-bezier(0.2, 0.7, 0.3, 1); transform-origin: right center; backface-visibility: hidden; }
  .bpage.settle { animation: pageSettle 0.45s ease-out; }
  @keyframes pageInNext { from { transform: rotateY(86deg); opacity: 0.5; } to { transform: none; opacity: 1; } }
  @keyframes pageInPrev { from { transform: rotateY(-86deg); opacity: 0.5; } to { transform: none; opacity: 1; } }
  @keyframes pageSettle { from { opacity: 0.2; } to { opacity: 1; } }
  /* 見開き中央のノドの陰影（本らしさ） */
  .bookpages:not(.single) {
    background:
      linear-gradient(90deg, transparent 44%, rgba(2,4,10,0.55) 49.6%, rgba(2,4,10,0.8) 50%, rgba(2,4,10,0.55) 50.4%, transparent 56%),
      rgba(5,10,30,0.5);
  }

  .cardspace { display: flex; flex-direction: column; align-items: center; gap: 12px; padding-top: 6px; min-height: 70vh; justify-content: center; }
  .cshud { width: 100%; max-width: 480px; display: flex; align-items: center; justify-content: space-between; }
  .cshud .cid { font-family: var(--mono); font-size: 11px; letter-spacing: 2px; color: var(--cyan-dim); }
  .cstage { perspective: 1100px; touch-action: none; padding: 10px 0 4px; cursor: grab; user-select: none; -webkit-user-select: none; }
  .cstage:active { cursor: grabbing; }
  .cobj { position: relative; width: min(320px, 76vw); aspect-ratio: 63/88; transform-style: preserve-3d; will-change: transform; }
  /* 表裏をZ方向に微小分離+面内のfilter禁止（preserve-3d内のfilterは面のレイヤー化を壊しZファイトでチラつく） */
  .cface { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; transform: translateZ(0.4px); }
  .cface.backface { transform: rotateY(180deg) translateZ(0.4px); }
  .cface .ccard { height: 100%; }
  .cface .ccard, .cface .cback { filter: none; }
  .cback {
    width: 100%; height: 100%; position: relative;
    --cutL: 11px; --cut: 5px;
    clip-path: polygon(
      var(--cutL) 0, calc(100% - var(--cut)) 0, 100% var(--cut),
      100% calc(100% - var(--cutL)), calc(100% - var(--cutL)) 100%,
      var(--cut) 100%, 0 calc(100% - var(--cut)), 0 var(--cutL)
    );
    background: linear-gradient(180deg, var(--frame) 0%, var(--frame-dim) 45%, var(--frame) 100%);
    filter: drop-shadow(0 0 12px rgba(58,110,255,0.38));
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  }
  .cback::before {
    content: ""; position: absolute; inset: 1px; z-index: 0; pointer-events: none;
    clip-path: polygon(
      var(--cutL) 0, calc(100% - var(--cut)) 0, 100% var(--cut),
      100% calc(100% - var(--cutL)), calc(100% - var(--cutL)) 100%,
      var(--cut) 100%, 0 calc(100% - var(--cut)), 0 var(--cutL)
    );
    background:
      repeating-linear-gradient(45deg, rgba(58,110,255,0.05) 0 2px, transparent 2px 14px),
      linear-gradient(160deg, #0a1636, #05081a);
  }
  .cback > * { position: relative; z-index: 1; }
  .cback .cbem { font-size: 46px; color: var(--cyan); text-shadow: 0 0 20px rgba(122,160,255,0.8); }
  .cback .cbt { font-family: var(--mono); letter-spacing: 4px; color: var(--cyan-dim); font-size: 14px; text-align: center; line-height: 1.7; }
  .cback .cbs { font-family: var(--mono); font-size: 8px; letter-spacing: 2px; color: var(--muted); }
  .chintbar { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--muted); }

  .panel::before, .vpanel::before, .ccard::before {
    content: ""; position: absolute; left: 0; right: 0; height: 9px; top: -6%;
    background: linear-gradient(180deg, transparent, rgba(122,160,255,0.22), transparent);
    opacity: 0; pointer-events: none; z-index: 1;
    animation: glitchband 8s linear infinite;
  }
  .vpanel::before { animation-duration: 13s; animation-delay: 1.2s; }
  .float.d1::before { animation-delay: 2.7s; }
  .float.d2::before { animation-delay: 5.3s; }
  .ccard::before { animation-duration: 10s; animation-delay: 3.1s; }
  @keyframes glitchband {
    0%, 86% { opacity: 0; top: -6%; }
    87% { opacity: 0.9; top: 8%; }
    89% { opacity: 0.3; top: 42%; }
    91% { opacity: 0.75; top: 68%; }
    93% { opacity: 0.4; top: 90%; }
    94%, 100% { opacity: 0; top: 106%; }
  }

  #toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
    z-index: 40; opacity: 0; pointer-events: none;
    font-family: var(--mono); font-size: 12px; letter-spacing: 1px; color: var(--cyan);
    background: rgba(6, 14, 36, 0.94); border: 1px solid var(--line-bright); border-radius: 0;
    padding: 10px 16px; box-shadow: 0 0 20px rgba(58,110,255,0.35);
    transition: opacity 0.25s, transform 0.25s;
    max-width: 90vw; text-align: center;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (min-width: 761px) and (max-height: 560px) {
    .scene { perspective-origin: 50% 46%; }
    .stage { height: 480px; }
    #panel-records { top: 0; width: 380px; margin-left: -190px; }
    #panel-archive, #panel-system { top: 34px; width: 245px; }
    #console { bottom: 0; }
    .cardspace { min-height: 0; }
    .cobj { width: calc((100vh - 175px) * 0.716); width: calc((100dvh - 175px) * 0.716); }
    /* 横持ち: 行の高さ=カードの高さに揃うよう概要を間引き、3行が必ず収まる計算に */
    .bslot { width: calc((100vh - 225px) / 3 * 0.716); width: calc((100dvh - 225px) / 3 * 0.716); min-width: 50px; }
    .bpage { padding: 6px; gap: 6px; }
    .bsum { gap: 3px; }
    .bsum-t { font-size: 11px; -webkit-line-clamp: 1; }
    .bsum-m, .bsum-g { display: none; }
    .booknav { margin-bottom: 6px; }
    .booknav .btn { padding: 5px 12px; }
    .cobj .cimg .glyph { font-size: 13px; letter-spacing: 1px; text-shadow: 0 0 8px rgba(122,160,255,0.7); }
    .cobj .cback .cbem { font-size: 26px; }
    .cobj .cback .cbt { font-size: 11px; letter-spacing: 2px; }
    .cobj .cback .cbs { font-size: 7px; }
    .kcard { padding: 7px 9px; }
    .kcard .thumb { flex-basis: 44px; height: 44px; }
    #view { padding: 52px 40px 20px; }
    .vpanel { max-width: 640px; }
    .vbody { padding: 12px 14px 16px; }
    .field { margin-bottom: 10px; }
    input[type="text"], input[type="search"], input[type="url"], textarea, select { padding: 7px 10px; font-size: 13px; }
    textarea { min-height: 64px; }
  }

  @media (max-width: 760px) {
    body { overflow: auto; }
    .scene { position: static; perspective: 900px; display: block; padding: 64px 12px 24px; height: auto; min-height: 100%; }
    .stage { width: 100%; height: auto; display: flex; flex-direction: column; gap: 16px; transform: rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)); }
    .floor { position: fixed; top: auto; bottom: -46%; }
    .panel { position: static; width: 100% !important; margin: 0 !important; }
    #panel-archive { transform: rotateY(5deg); }
    #panel-records { transform: translateZ(20px); order: -1; }
    #panel-system { transform: rotateY(-5deg); }
    #console { transform: none; order: -2; }
    .hud .stats { font-size: 10px; }
    .grid2 { grid-template-columns: 1fr; }
    #view { padding: 58px 8px 20px; }
    .vbody { padding: 12px 12px 16px; }
    .dmeta .date { margin-left: 0; width: 100%; }
  }
</style>
</head>
<body>
<div id="circuit"></div>
<canvas id="bg"></canvas>

<header class="hud">
  <div class="brand" id="go-home">KNOWLEDGE CODEX</div>
  <div class="right">
    <div class="stats">RECORDS: <span id="st-rec">0</span> // TAGS: <span id="st-tag">0</span><br>SYNC <span id="clock">--:--:--</span></div>
    <div class="gear" id="go-settings" title="設定">⚙</div>
    <button class="hud-back" id="hud-back" aria-label="戻る">◀ back</button>
  </div>

<div class="scene">
  <div class="stage" id="stage">
    <div class="floor"></div>

      <div class="p-body" id="archive-body"></div>
    </section>

    <section class="panel float" id="panel-records">
            <div class="p-head"><span class="dot"></span>RECENT RECORDS<span class="jp">最近の知識 — タップで一覧へ</span></div>
      <div class="p-body" id="recent-body"></div>
    </section>

    <section class="panel float d2" id="panel-system">
            <div class="p-head"><span class="dot"></span>SYSTEM<span class="jp">状態</span></div>

          <span class="key">/</span>

        <button class="capture" id="btn-capture">+ CAPTURE</button>
      </div>

<div id="view"></div>
<div id="toast"></div>

<script>
'use strict';

/* ---------- utils ---------- */
function $(sel, el) { return (el || document).querySelector(sel); }
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function today() {
  var d = new Date();
  function z(n) { return (n < 10 ? '0' : '') + n; }
  return d.getFullYear() + '-' + z(d.getMonth() + 1) + '-' + z(d.getDate());
}
function fmtDate(iso) { return (iso || '').slice(0, 10); }

var toastEl = document.getElementById('toast');
var toastTimer = null;
function showToast(msg) {
  if (/失敗|エラー|無効|不正|拒否|NOT FOUND|ERROR/.test(msg)) beep('err');
  else if (/^(REGISTERED|SAVED|ENRICHED|APPLIED|ARCHIVED|RESTORED|APPENDED|EXPORTED|IMPORTED|COPIED|DELETED|TAG|AI SETTINGS)/.test(msg)) beep('ok');
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { toastEl.classList.remove('show'); }, 2400);
}

/* ---------- sound (Kenney "Interface Sounds" CC0 samples / sounds/) ---------- */
var audioCtx = null, sndMaster = null, sndBufs = {}, sndLoading = false;
var SND_SRC = { tap: 'sounds/tap.wav', open: 'sounds/open.wav', ok: 'sounds/ok.wav', err: 'sounds/err.wav', flip: 'sounds/flip.wav', spin: 'sounds/spin.wav' };
var SND_VOL = { tap: 0.55, open: 0.6, ok: 0.65, err: 0.6, flip: 0.5, spin: 0.55 };
function soundOn() { return localStorage.getItem('kx-sound') !== 'off'; }
/* 起動時にsuspendedで生成してデコードまで済ませる（初回タップから鳴らすため）。再生はジェスチャーでresume後 */
function initAudio() {
  if (audioCtx || sndLoading) return;
  var AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;
  audioCtx = new AC();
  sndMaster = audioCtx.createGain();
  sndMaster.gain.value = 0.9;
  sndMaster.connect(audioCtx.destination);
  sndLoading = true;
  Object.keys(SND_SRC).forEach(function (k) {
    fetch(SND_SRC[k]).then(function (r) {
      if (!r.ok) throw new Error(r.status);
      return r.arrayBuffer();
    }).then(function (ab) {
      return new Promise(function (res, rej) { audioCtx.decodeAudioData(ab, res, rej); });
    }).then(function (buf) { sndBufs[k] = buf; }).catch(function () {});
  });
}
function audioReady() {
  if (!audioCtx) initAudio();
  if (!audioCtx) return false;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return true;
}
function beep(kind) {
  if (!soundOn()) return;
  try {
    if (!audioReady()) return;
    var buf = sndBufs[kind];
    if (!buf) return;
    var src = audioCtx.createBufferSource();
    src.buffer = buf;
    var g = audioCtx.createGain();
    g.gain.value = SND_VOL[kind] || 0.5;
    src.connect(g); g.connect(sndMaster);
    src.start();
  } catch (e) {}

/* ---------- IndexedDB ---------- */
var DB_NAME = 'knowledge-codex', DB_STORE = 'records', FILE_STORE = 'files', db = null;
function openDB() {
  return new Promise(function (res, rej) {
    var r = indexedDB.open(DB_NAME, 2);
    r.onupgradeneeded = function () {
      if (!r.result.objectStoreNames.contains(DB_STORE)) r.result.createObjectStore(DB_STORE, { keyPath: 'id' });
      if (!r.result.objectStoreNames.contains(FILE_STORE)) r.result.createObjectStore(FILE_STORE, { keyPath: 'id' });
    };
    r.onsuccess = function () { res(r.result); };
    r.onerror = function () { rej(r.error); };
  });
}
function dbPutFile(f) {
  return new Promise(function (res, rej) {
    var tx = db.transaction(FILE_STORE, 'readwrite');
    tx.objectStore(FILE_STORE).put(f);
    tx.oncomplete = function () { res(); };
    tx.onerror = function () { rej(tx.error); };
  });
}
function dbGetFile(id) {
  return new Promise(function (res, rej) {
    var tx = db.transaction(FILE_STORE, 'readonly').objectStore(FILE_STORE).get(id);
    tx.onsuccess = function () { res(tx.result || null); };
    tx.onerror = function () { rej(tx.error); };
  });
}
function dbDelFile(id) {
  return new Promise(function (res, rej) {
    var tx = db.transaction(FILE_STORE, 'readwrite');
    tx.objectStore(FILE_STORE).delete(id);
    tx.oncomplete = function () { res(); };
    tx.onerror = function () { rej(tx.error); };
  });
}
function newFileId() {
  return 'F-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7);
}
function compressImage(file) {
  return new Promise(function (res, rej) {
    var url = URL.createObjectURL(file);
    var img = new Image();
    img.onload = function () {
      var MAX = 1280;
      var w = img.naturalWidth, h = img.naturalHeight;
      if (w > MAX || h > MAX) {
        var scale = MAX / Math.max(w, h);
        w = Math.round(w * scale); h = Math.round(h * scale);
      }
      var c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      c.toBlob(function (blob) {
        if (blob) res(blob); else rej(new Error('画像の変換に失敗'));
      }, 'image/jpeg', 0.85);
    };
    img.onerror = function () { URL.revokeObjectURL(url); rej(new Error('画像を読み込めません')); };
    img.src = url;
  });
}
function blobToDataURL(blob) {
  return new Promise(function (res, rej) {
    var fr = new FileReader();
    fr.onload = function () { res(fr.result); };
    fr.onerror = function () { rej(fr.error); };
    fr.readAsDataURL(blob);
  });
}
function hydrateThumbs(container) {
  [].forEach.call(container.querySelectorAll('.thumb[data-thumb]'), function (el) {
    dbGetFile(el.dataset.thumb).then(function (f) {
      if (f && f.blob) {
        el.classList.add('has-img');
        el.style.backgroundImage = 'url(' + URL.createObjectURL(f.blob) + ')';
      }
    });
  });
}

  box.className = 'lightbox';

  box.addEventListener('click', function () { document.body.removeChild(box); });
  document.body.appendChild(box);
}
function dbAll() {
  return new Promise(function (res, rej) {
    var tx = db.transaction(DB_STORE, 'readonly').objectStore(DB_STORE).getAll();
    tx.onsuccess = function () { res(tx.result || []); };
    tx.onerror = function () { rej(tx.error); };

}

}
function dbDel(id) {

/* ---------- state ---------- */
var state = { records: [] };
function byId(id) {
  for (var i = 0; i < state.records.length; i++) if (state.records[i].id === id) return state.records[i];
  return null;
}
function nextId() {
  var max = 0;
  state.records.forEach(function (r) {
    var n = parseInt((r.id || '').split('-')[1], 10);
    if (n > max) max = n;
  });
  return 'KX-' + String(max + 1).padStart(4, '0');
}
function saveRecord(rec) {
  rec.updatedAt = new Date().toISOString();
  var i = state.records.findIndex(function (r) { return r.id === rec.id; });
  if (i >= 0) state.records[i] = rec; else state.records.push(rec);
  return dbPut(rec);
}
function newRecord(o) {
  return Object.assign({
    id: nextId(), title: '', oneLiner: '', body: '',
    attachments: [], links: [], category: '', tags: [],
    type: 'insight', importance: 1, status: 'captured', favorite: false,
    ai: null, appendLog: [], usedIn: [],
    createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
  }, o || {});
}
function allTags() {
  var set = {};
  state.records.forEach(function (r) { (r.tags || []).forEach(function (t) { set[t] = 1; }); });
  return Object.keys(set).sort();
}

function buildPrompt(r) {
  var lines = [];
  lines.push('あなたは制作知識を整理するアシスタントです。以下の知識メモを分析し、指定のJSON形式「だけ」を出力してください。前後の説明文やコードフェンスは不要です。');

  lines.push('タイトル: ' + r.title);
  if (r.oneLiner) lines.push('一言メモ: ' + r.oneLiner);
  if (r.body) lines.push('本文: ' + r.body);
  lines.push('カテゴリ: ' + (r.category || '未分類'));
  lines.push('タグ: ' + ((r.tags || []).join(', ') || 'なし'));
  lines.push('');
  var tags = allTags();
  if (tags.length) {
    lines.push('【既存タグ一覧（suggestedTagsはなるべくここから選ぶ。適切なものが無ければ新規でも可）】');
    lines.push(tags.join(', '));
    lines.push('');
  }
  lines.push('【カテゴリ大分類（suggestedCategoryは「大分類/中分類」の形式で）】');
  lines.push(CATS.join(' / '));
  lines.push('');
  lines.push('【出力形式（このJSONのみを出力）】');
  lines.push(JSON.stringify({
    summary: '2〜3文の要約',
    keyPoints: ['重要ポイントを3〜5個'],
    terms: [{ term: '技術語', desc: '1文の説明' }],
    useCases: ['この知識が使える場面'],
    nextKeywords: ['次に調べるキーワード'],
    nextExperiments: ['次に試す検証'],
    suggestedTags: ['タグ案を最大5個'],
    suggestedCategory: '大分類/中分類',
    importance: 2
  }, null, 2));
  return lines.join('\n');
}
function parseAIJson(text) {
  var t = String(text || '').trim();
  t = t.replace(/^```[a-zA-Z]*\s*/, '').replace(/```\s*$/, '');
  var a = t.indexOf('{'), b = t.lastIndexOf('}');
  if (a < 0 || b <= a) throw new Error('JSONが見つかりません');
  var o = JSON.parse(t.slice(a, b + 1));
  if (typeof o.summary !== 'string' || !o.summary) throw new Error('summary がありません');
  ['keyPoints', 'useCases', 'nextKeywords', 'nextExperiments', 'suggestedTags'].forEach(function (k) {
    o[k] = Array.isArray(o[k]) ? o[k].map(String) : [];
  });
  o.terms = (Array.isArray(o.terms) ? o.terms : []).map(function (x) {
    return { term: String((x && x.term) || ''), desc: String((x && x.desc) || '') };
  }).filter(function (x) { return x.term; });
  o.suggestedCategory = String(o.suggestedCategory || '');
  o.importance = Math.min(3, Math.max(1, parseInt(o.importance, 10) || 2));
  return o;
}

/* ---------- terms glossary view ---------- */
function collectTerms() {
  var map = {};
  state.records.forEach(function (r) {
    if (r.status === 'archived') return;
    ((r.ai && r.ai.terms) || []).forEach(function (t) {
      if (!t.term) return;
      var k = t.term.toLowerCase();
      if (!map[k]) map[k] = { term: t.term, descs: [], sources: [] };
      if (t.desc && map[k].descs.indexOf(t.desc) < 0) map[k].descs.push(t.desc);
      if (!map[k].sources.some(function (s) { return s.id === r.id; })) {
        map[k].sources.push({ id: r.id, title: r.title });
      }
    });
  });
  return Object.keys(map).sort().map(function (k) { return map[k]; });
}

    openView(html, function (v) {

        vel = Math.max(-16, Math.min(16, lastDX * 0.6));

      stage.addEventListener('pointercancel', function () { down = null; });
    });

/* ---------- circuit background (回路基板パターン / lookdev-1承認) ---------- */
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    var t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
/* 45°で折れる配線・並走束・終端パッド・SMD列・バス線。縁に密/中央に疎。シード固定 */
function genCircuit(W, H, seed) {
  var rnd = mulberry32(seed);
  var G = 6;
  var out = [];
  function snap(v) { return Math.round(v / G) * G; }
  function density(x, y) {
    var dx = Math.abs(x - W / 2) / (W / 2);
    var dy = Math.abs(y - H / 2) / (H / 2);
    var d = Math.max(dx, dy);
    return 0.16 + 0.84 * d * d;
  }
  var nTr = Math.round(W * H / 5200);
  for (var i = 0; i < nTr; i++) {
    var x0 = snap(rnd() * W), y0 = snap(rnd() * H);
    if (rnd() > density(x0, y0)) continue;
    var bundle = rnd() < 0.5 ? 2 + Math.floor(rnd() * 5) : 1;
    var dir = rnd() < 0.5 ? 1 : -1;
    var segs = 3 + Math.floor(rnd() * 5);
    var pts = [[x0, y0]];
    var x = x0, y = y0;
    for (var s = 0; s < segs; s++) {
      x += dir * G * (4 + Math.floor(rnd() * 19));
      pts.push([x, y]);
      if (s < segs - 1 && rnd() < 0.66) {
        var v = G * (1 + Math.floor(rnd() * 3));
        var vd = rnd() < 0.5 ? 1 : -1;
        x += dir * v; y += vd * v;
        pts.push([x, y]);
      }
    }
    var hi = rnd() < 0.03;
    var op = hi ? 0.55 : 0.13 + rnd() * 0.17;
    for (var b = 0; b < bundle; b++) {
      var off = b * 4;
      var d2 = '';
      for (var p = 0; p < pts.length; p++) d2 += (p ? 'L' : 'M') + pts[p][0] + ',' + (pts[p][1] + off);
      out.push('<path class="' + (hi ? 'trhi' : 'tr') + '" d="' + d2 + '" stroke-width="' + (hi ? 0.8 : 0.6) + '" opacity="' + op.toFixed(2) + '"/>');
      if (rnd() < 0.7) {
        var ex = pts[pts.length - 1][0], ey = pts[pts.length - 1][1] + off;
        var kind = rnd();
        if (kind < 0.42) out.push('<circle class="padf" cx="' + ex + '" cy="' + ey + '" r="1.2" opacity="' + Math.min(0.6, op + 0.18).toFixed(2) + '"/>');
        else if (kind < 0.78) out.push('<circle class="pado" cx="' + ex + '" cy="' + ey + '" r="2.2" stroke-width="0.7" opacity="' + Math.min(0.55, op + 0.12).toFixed(2) + '"/>');
        else out.push('<circle class="pado" cx="' + ex + '" cy="' + ey + '" r="3" stroke-width="0.7" opacity="' + op.toFixed(2) + '"/><circle class="padf" cx="' + ex + '" cy="' + ey + '" r="1" opacity="' + Math.min(0.6, op + 0.18).toFixed(2) + '"/>');
      }
      if (b === 0 && rnd() < 0.4) out.push('<circle class="padf" cx="' + pts[0][0] + '" cy="' + (pts[0][1] + off) + '" r="1.2" opacity="' + op.toFixed(2) + '"/>');
    }
  }
  var nBus = Math.max(4, Math.round(nTr * 0.045));
  for (i = 0; i < nBus; i++) {
    var bx = snap(rnd() * W), by = snap(rnd() * H);
    if (rnd() > density(bx, by)) continue;
    var bdir = rnd() < 0.5 ? 1 : -1;
    var bl = G * (12 + Math.floor(rnd() * 30));
    var jog = G * (2 + Math.floor(rnd() * 4));
    var jd = rnd() < 0.5 ? 1 : -1;
    var d3 = 'M' + bx + ',' + by + 'L' + (bx + bdir * bl) + ',' + by +
      'L' + (bx + bdir * (bl + jog)) + ',' + (by + jd * jog) +
      'L' + (bx + bdir * (bl + jog + G * (5 + Math.floor(rnd() * 12)))) + ',' + (by + jd * jog);
    out.push('<path class="tr" d="' + d3 + '" stroke-width="1.4" opacity="' + (0.2 + rnd() * 0.12).toFixed(2) + '"/>');
  }
  var nBlk = Math.max(5, Math.round(W * H / 150000));
  for (i = 0; i < nBlk * 3; i++) {
    var kx = snap(rnd() * W), ky = snap(rnd() * H);
    if (rnd() > density(kx, ky) * 0.9) continue;
    var cnt = 5 + Math.floor(rnd() * 7);
    var bop = (0.18 + rnd() * 0.14).toFixed(2);
    for (var c = 0; c < cnt; c++) out.push('<rect class="padf" x="' + (kx + c * 5) + '" y="' + ky + '" width="2" height="6" opacity="' + bop + '"/>');
    if (rnd() < 0.5) out.push('<path class="tr" d="M' + (kx - G * 4) + ',' + (ky + 3) + 'L' + kx + ',' + (ky + 3) + '" stroke-width="0.6" opacity="' + bop + '"/>');
  }
  /* コーナーモチーフ: 四隅+ランダム数カ所にL字二重線+チック */
  var m = 14;
  var cors = [[m, m, 1, 1], [W - m, m, -1, 1], [m, H - m, 1, -1], [W - m, H - m, -1, -1]];
  var nExtra = 3 + Math.floor(rnd() * 4);
  for (i = 0; i < nExtra; i++) {
    var rx = snap(rnd() * W), ry = snap(rnd() * (H * 0.25)) + (rnd() < 0.5 ? 0 : Math.round(H * 0.75));
    cors.push([rx, ry, rnd() < 0.5 ? 1 : -1, rnd() < 0.5 ? 1 : -1]);
  }
  for (i = 0; i < cors.length; i++) {
    var cxx = cors[i][0], cyy = cors[i][1], hx = cors[i][2], hy = cors[i][3];
    var L1 = G * (8 + Math.floor(rnd() * 8)), L2 = G * (5 + Math.floor(rnd() * 5));
    var cop = (0.28 + rnd() * 0.14).toFixed(2);
    out.push('<path class="tr" d="M' + (cxx + hx * L1) + ',' + cyy + 'L' + cxx + ',' + cyy + 'L' + cxx + ',' + (cyy + hy * L2) + '" stroke-width="0.9" opacity="' + cop + '"/>');
    out.push('<path class="tr" d="M' + (cxx + hx * (L1 * 0.7)) + ',' + (cyy + hy * 4) + 'L' + (cxx + hx * 4) + ',' + (cyy + hy * 4) + 'L' + (cxx + hx * 4) + ',' + (cyy + hy * (L2 * 0.7)) + '" stroke-width="0.6" opacity="' + cop + '"/>');
    for (var t = 0; t < 4; t++) out.push('<rect class="padf" x="' + (cxx + hx * (10 + t * 6) - 1) + '" y="' + (cyy + hy * 8 - (hy > 0 ? 0 : 3)) + '" width="2" height="3" opacity="' + cop + '"/>');
  }
  return '<svg xmlns="http://www.w3.org/2000/svg" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">' + out.join('') + '</svg>';
}

function onOrient(e) {

  var g = Math.max(-25, Math.min(25, e.gamma || 0));
  var b = Math.max(-25, Math.min(25, (e.beta || 45) - 45));
  targRy = g / 25 * 5;
  targRx = b / 25 * -3;
}
if (!matchMedia('(hover: hover)').matches) {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    var askGyro = function () {
      DeviceOrientationEvent.requestPermission().then(function (r) {
        if (r === 'granted') addEventListener('deviceorientation', onOrient);
      }).catch(function () {});
      removeEventListener('touchend', askGyro);
    };
    addEventListener('touchend', askGyro);
  } else {
    addEventListener('deviceorientation', onOrient);
  }
}

function draw(t) {
  t = t || 0;
  if (t - lastInput > 4000) {
    targRy = Math.sin(t * 0.00035) * 2.2;
    targRx = Math.cos(t * 0.00027) * 1.4;
  }
  curRx += (targRx - curRx) * 0.055;
  curRy += (targRy - curRy) * 0.055;
  stage.style.setProperty('--rx', curRx.toFixed(3) + 'deg');
  stage.style.setProperty('--ry', curRy.toFixed(3) + 'deg');

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  var g = ctx.createRadialGradient(canvas.width / 2, canvas.height * 0.42, 40, canvas.width / 2, canvas.height * 0.42, canvas.width * 0.7);
  g.addColorStop(0, 'rgba(24,48,120,0.28)');
  g.addColorStop(1, 'rgba(3,7,17,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  var parX = curRy / 7, parY = curRx / 5;
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    p.y += p.vy;
    if (p.y < -4) { p.y = canvas.height + 4; p.x = Math.random() * canvas.width; }
    ctx.beginPath();
    ctx.arc(p.x + parX * 46 * p.z, p.y - parY * 30 * p.z, p.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(122,160,255,' + p.a + ')';
    ctx.fill();
  }
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

/* ---------- boot ---------- */
openDB().then(function (d) {
  db = d;
  return dbAll();
}).then(function (recs) {
  if (recs.length === 0) {
    var seeds = seedRecords();
    state.records = seeds;
    return Promise.all(seeds.map(dbPut)).then(function () { return seeds; });
  }
  state.records = recs;
}).then(function () {
  renderHome();
  route();
}).catch(function (err) {
  showToast('DB初期化エラー: ' + err);
});
</script>
